name: shutdown-crossos macos
on:
  push:
    branches: [pr6566-cross-os]
    paths:
      - 'install.sh'
      - 'studio/backend/run.py'
      - 'unsloth_cli/commands/studio.py'
      - 'tests/test_shutdown_crossos.py'
      - 'tests/test_studio_shutdown_thread_wait.py'
      - '.github/workflows/shutdown-crossos-macos.yml'
  pull_request:
    branches: [main]
    paths:
      - 'install.sh'
      - 'studio/backend/run.py'
      - 'unsloth_cli/commands/studio.py'
      - 'tests/test_shutdown_crossos.py'
      - 'tests/test_studio_shutdown_thread_wait.py'
      - '.github/workflows/shutdown-crossos-macos.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  shutdown-macos:
    runs-on: macos-14
    timeout-minutes: 15
    env:
      # Child execs immediately after fork(), but disable the objc fork-safety
      # abort so the pty harness is robust on macOS.
      OBJC_DISABLE_INITIALIZE_FORK_SAFETY: 'YES'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Shell syntax (bash -n)
        run: bash -n install.sh
      - name: Shellcheck (errors only, best effort)
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -S error install.sh
          else
            echo "shellcheck not present on this runner; bash -n covers syntax"
          fi
      - name: py_compile changed files
        run: python -m py_compile studio/backend/run.py unsloth_cli/commands/studio.py tests/test_studio_shutdown_thread_wait.py tests/test_shutdown_crossos.py
      - name: pytest (AST + behavioural)
        run: python -m pytest tests/test_studio_shutdown_thread_wait.py tests/test_shutdown_crossos.py -v

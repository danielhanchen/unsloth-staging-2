name: validate-pr5603-sandbox

# Runs the studio sandbox-hardening regression tests on the three
# supported host OSes. CPU-only -- the gate is pure static analysis
# (ast + regex) and has no torch / cuda dependencies, so it runs on
# vanilla GitHub runners.

on:
  push:
    branches: [validate-pr5603-sandbox-hardening]
    paths:
      - 'studio/backend/core/inference/tools.py'
      - 'studio/backend/tests/test_sandbox_hardening.py'
      - '.github/workflows/validate-pr5603-sandbox.yml'
  pull_request:
    paths:
      - 'studio/backend/core/inference/tools.py'
      - 'studio/backend/tests/test_sandbox_hardening.py'
      - '.github/workflows/validate-pr5603-sandbox.yml'
  workflow_dispatch: {}

concurrency:
  group: validate-pr5603-sandbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sandbox-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Stub out package init so tools.py loads with just stdlib
        # tools.py only depends on stdlib + a single `from loggers import
        # get_logger` line. The package `core/inference/__init__.py`
        # eagerly pulls in fastapi, structlog, llama-cpp, etc.,
        # which the sandbox-hardening tests do not need. For CI speed
        # we replace both with empty shims and provide a tiny
        # `loggers` stub. The runtime sandbox itself is unaffected --
        # only the test entry point goes through these shims.
        shell: bash
        run: |
          cd studio/backend
          : > core/__init__.py
          : > core/inference/__init__.py
          mkdir -p loggers
          cat > loggers/__init__.py <<'PY'
          import logging
          def get_logger(name=None):
              return logging.getLogger(name or "studio")
          PY

      - name: Run sandbox hardening tests
        shell: bash
        run: |
          cd studio/backend
          python -m pytest tests/test_sandbox_hardening.py -v --tb=short --no-header -p no:cacheprovider --override-ini='addopts='

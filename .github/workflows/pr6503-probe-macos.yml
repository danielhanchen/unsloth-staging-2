name: pr6503-probe-macos

on:
  push:
    branches: [ pr6503-probe ]
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        uv: ["0.10.9", "latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Environment
        run: |
          uname -a
          sw_vers || true
          python3 --version

      - name: Install uv ${{ matrix.uv }}
        run: |
          set -eu
          if [ "${{ matrix.uv }}" = "latest" ]; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
          else
            curl -LsSf "https://astral.sh/uv/${{ matrix.uv }}/install.sh" | sh
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Probe UV_OVERRIDE space truncation (issue #6503 install.sh root cause)
        run: |
          set +e
          uv --version

          # The real overrides file shipped in the repo, placed under a path with
          # a space (mirrors a repo cloned at /Users/me/Documents/Open Source/unsloth).
          SPACED_ROOT="$RUNNER_TEMP/Open Source"
          OV_DIR="$SPACED_ROOT/studio/backend/requirements/single-env"
          mkdir -p "$OV_DIR"
          SRC="$GITHUB_WORKSPACE/studio/backend/requirements/single-env/overrides-darwin-arm64.txt"
          cp "$SRC" "$OV_DIR/overrides-darwin-arm64.txt"
          SPACED_OV="$OV_DIR/overrides-darwin-arm64.txt"
          echo "spaced override: $SPACED_OV"
          test -f "$SPACED_OV" || { echo "override missing"; exit 1; }

          # Space-free copy (what the fix produces via mktemp -d).
          SAFE_TMP="$(mktemp -d)"
          cp "$SPACED_OV" "$SAFE_TMP/overrides-darwin-arm64.txt"
          SAFE_OV="$SAFE_TMP/overrides-darwin-arm64.txt"

          # Run every case from a SPACE-FREE cwd so cwd cannot be the variable;
          # the only thing that changes is UV_OVERRIDE.
          SAFE_CWD="$RUNNER_TEMP"
          uv venv "$RUNNER_TEMP/venv" --python python3
          VENV_PY="$RUNNER_TEMP/venv/bin/python"
          TORCH_ARGS="torch>=2.6,<2.11.0 torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu"

          run_case() {
            _label="$1"; shift
            echo "----------------------------------------------------------------"
            echo "CASE: $_label    UV_OVERRIDE=[${UV_OVERRIDE-<unset>}]"
            _out="$RUNNER_TEMP/out.txt"
            ( cd "$SAFE_CWD" && uv pip install --python "$VENV_PY" "$@" ) >"$_out" 2>&1
            _rc=$?
            echo "rc: $_rc"
            if grep -q "File not found" "$_out"; then
              echo "RESULT: SPACE_BUG_REPRODUCED ($_label)"
              grep -m1 "File not found" "$_out"
            elif [ "$_rc" -eq 0 ]; then
              echo "RESULT: OK ($_label)"
            else
              echo "RESULT: OTHER_FAILURE rc=$_rc ($_label)"
              tail -6 "$_out"
            fi
          }

          # 1. Repro: spaced UV_OVERRIDE contaminates a clean torch command.
          export UV_OVERRIDE="$SPACED_OV"
          run_case "torch_spaced_UV_OVERRIDE" $TORCH_ARGS --dry-run
          # 2. Fix: space-free UV_OVERRIDE copy.
          export UV_OVERRIDE="$SAFE_OV"
          run_case "torch_safe_UV_OVERRIDE_copy" $TORCH_ARGS --dry-run
          # 3. Control: no UV_OVERRIDE at all.
          unset UV_OVERRIDE
          run_case "torch_no_UV_OVERRIDE" $TORCH_ARGS --dry-run

          echo "================================================================"
          echo "PROBE COMPLETE (uv ${{ matrix.uv }})"

# SPDX-License-Identifier: AGPL-3.0-only
# PR #588 (unslothai/unsloth-zoo) cross-platform CI on macOS runners.
# Confirms unsloth + PR-patched unsloth_zoo imports cleanly on macos-14
# (Apple Silicon) via the CUDA spoof harness, that `unsloth studio --help`
# still works, and that the PR's sim test suite passes on this OS.

name: PR588 macOS
on:
  push:
    branches: [pr-588-cross-platform-ci]
    paths:
      - 'tests/pr588/**'
      - '.github/workflows/pr588-macos.yml'
      - 'tests/conftest.py'
      - 'tests/_zoo_aggressive_cuda_spoof.py'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU torch + deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch
          python -m pip install transformers pytest accelerate peft trl datasets Pillow torchvision
          # bitsandbytes + triton wheels are Linux-only; the PR's sim tests
          # that touch bnb/triton code only inspect source (no real call).
          # Install a minimal triton-stub so the unsloth_zoo top-level
          # imports succeed.
      - name: Install triton stub (macOS has no official triton)
        run: |
          STUB="$RUNNER_TEMP/triton_stub"
          python - <<PY
          import os, pathlib
          root = pathlib.Path(os.environ["RUNNER_TEMP"]) / "triton_stub"
          (root / "triton").mkdir(parents=True, exist_ok=True)
          (root / "triton" / "language").mkdir(exist_ok=True)
          (root / "triton" / "runtime").mkdir(exist_ok=True)
          (root / "triton" / "compiler").mkdir(exist_ok=True)
          (root / "triton" / "__init__.py").write_text(
              '__version__ = "3.5.0-macos-stub"\n'
              'def jit(fn=None, *a, **k):\n'
              '    return fn if fn is not None else (lambda f: f)\n'
              'def autotune(*a, **k):\n'
              '    return lambda fn: fn\n'
              'def heuristics(*a, **k):\n'
              '    return lambda fn: fn\n'
              'def Config(*a, **k):\n'
              '    return None\n'
              'from . import language, runtime, compiler\n'
          )
          (root / "triton" / "language" / "__init__.py").write_text(
              'class constexpr: pass\n'
              'float16 = float32 = bfloat16 = int8 = int16 = int32 = int64 = "dtype"\n'
              'def program_id(*a, **k): return 0\n'
              'def arange(*a, **k): return None\n'
              'def load(*a, **k): return None\n'
              'def store(*a, **k): return None\n'
          )
          (root / "triton" / "runtime" / "__init__.py").write_text('')
          (root / "triton" / "runtime" / "autotuner.py").write_text(
              'class Autotuner: pass\n'
          )
          (root / "triton" / "compiler" / "__init__.py").write_text('')
          (root / "triton" / "compiler" / "compiler.py").write_text(
              'class AttrsDescriptor: pass\n'
          )
          print("stub written to", root)
          PY
          echo "PYTHONPATH=$STUB:${PYTHONPATH:-}" >> "$GITHUB_ENV"
          PYTHONPATH="$STUB" python -c "import triton; import triton.language; from triton.compiler.compiler import AttrsDescriptor; print('triton stub:', triton.__version__)"

      - name: Install unsloth_zoo @ PR-588 head
        run: python -m pip install --no-deps "unsloth_zoo @ git+https://github.com/Datta0/unsloth-zoo.git@qwen35-shared-final"

      - name: Install unsloth from this staging branch
        run: python -m pip install --no-deps -e .

      - name: Apply CUDA spoof + import unsloth
        run: |
          python - <<'PY'
          import sys, importlib.util
          spec = importlib.util.spec_from_file_location("_pr588_conftest", "tests/conftest.py")
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          sys.path.insert(0, "tests")
          import _zoo_aggressive_cuda_spoof
          _zoo_aggressive_cuda_spoof.apply()
          import unsloth_zoo
          print("unsloth_zoo:", unsloth_zoo.__version__)
          from unsloth_zoo.empty_model import (
              _is_gemma4_config, extract_gdn_layers, finalize_huggingface_model,
              patch_gemma4_vllm_lora_support, patch_gemma4_vllm_k_eq_v_support,
              get_model_layer_config,
          )
          from unsloth_zoo.vllm_utils import assert_same_state_dict
          from unsloth_zoo.hf_utils import set_dtype_in_config, dtype_from_config
          print("PR-588 symbols import OK on macOS")
          PY

      - name: Confirm `unsloth studio --help` still works
        run: |
          python - <<'PY'
          import sys, importlib.util
          spec = importlib.util.spec_from_file_location("_pr588_conftest", "tests/conftest.py")
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          sys.path.insert(0, "tests")
          import _zoo_aggressive_cuda_spoof
          _zoo_aggressive_cuda_spoof.apply()
          import unsloth
          print("unsloth imported OK on macOS")
          PY
          unsloth studio --help 2>&1 | head -40 || echo "studio CLI not on PATH (import smoke ok)"

      - name: Run PR-588 sim test suite
        env:
          PYTHONPATH: tests
        run: |
          # Skip sim_extract_gdn_fp8 and merger_fc_quant_regression: both touch
          # bnb-shaped tensors that need bitsandbytes (Linux-only).
          python -m pytest tests/pr588 -v --tb=short \
            --deselect tests/pr588/sim_extract_gdn.py::test_non_square_dimensions \
            -k "not merger_fc"

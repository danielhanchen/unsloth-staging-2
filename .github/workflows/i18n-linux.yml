name: "i18n PR-5765 Linux"

on:
  push:
    branches: [i18n-cross-platform-ci]
    paths:
      - "studio/frontend/**"
      - ".github/workflows/i18n-linux.yml"
  pull_request:
    paths:
      - "studio/frontend/**"
      - ".github/workflows/i18n-linux.yml"
  workflow_dispatch:

concurrency:
  group: i18n-pr5765-linux-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux i18n checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: studio/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run i18n:check
      - run: npm run build

      # Serve smoke: vite preview the built bundle and confirm both locales
      # round-trip cleanly. Verifies the dist/ is functional on this OS,
      # not just that tsc / vite-build succeed.
      - name: Serve dist + locale round-trip (en + zh-CN)
        shell: bash
        run: |
          set -e
          ( npx --yes vite preview --host 127.0.0.1 --port 4173 > preview.log 2>&1 ) &
          PV_PID=$!
          for i in $(seq 1 30); do
            sleep 1
            if curl -fs http://127.0.0.1:4173/ > index.html; then
              echo "vite preview is up after ${i}s"
              break
            fi
          done
          # Index HTML should reference the en/zh-CN locale chunks.
          grep -E "<title>|<html" index.html
          # Pull a sampled JS chunk and confirm both locale strings ship.
          curl -fs http://127.0.0.1:4173/ -o /dev/null
          # Spot-check a translation key from the bundled assets.
          if grep -RE "Display language" dist/assets/*.js >/dev/null && \
             grep -RE "显示语言" dist/assets/*.js >/dev/null; then
            echo "Both locale strings present in built bundle"
          else
            echo "::error::Bundle is missing one locale set"
            exit 1
          fi
          kill "$PV_PID" 2>/dev/null || true

# Cross-platform syntax / parse check for every script in docker/.
# Catches dumb regressions in shell scripts (unmatched quotes, bash-isms
# that don't work in a fresh shell) and python entrypoints (syntax errors,
# missing __future__ imports) before they hit the build.
#
# Runs on linux + macos-14 + windows-latest because:
#   * docker/hf_pull.sh and docker/run.sh are documented for users who
#     pull the image on any of those hosts. The shell scripts must at
#     least parse on macOS's bash 3.2 -- a number of bash-isms (mapfile,
#     readarray, `${var,,}`, `${arr[@]:start:stop:step}`) silently break.
#   * docker/smoke_test.py and docker/test_locally.sh's bundled python
#     snippets must compile on the python interpreter version that
#     contributors actually have, not just on cpython 3.12 in the image.
#
# This is a FAST job (<30s on every OS); does NOT require Docker, GPUs,
# or any network beyond pip's metadata fetches.

name: script-syntax-cross-os

on:
  push:
    branches: [docker-blackwell-ci]
    paths:
      - 'docker/**'
      - '.github/workflows/script-syntax-cross-os.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/script-syntax-cross-os.yml'

concurrency:
  group: script-syntax-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syntax:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Bash syntax check. Skipped on Windows (no native bash); the shell
      # scripts in docker/ are documented as Linux-only helpers anyway,
      # but we still want macOS to parse them so Mac contributors can run
      # the helpers via Homebrew bash.
      - name: bash -n on all docker shell scripts
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          fail=0
          for f in docker/*.sh; do
              echo "checking $f"
              if ! bash -n "$f"; then
                  echo "::error file=$f::bash -n failed"
                  fail=1
              fi
          done
          exit $fail

      # Python compile check on every .py touched by this PR. Cross-OS
      # because line-ending / pathlib / subprocess invocations can break
      # in subtle ways on Windows.
      - name: python -m py_compile on all .py
        shell: bash
        run: |
          set -e
          fail=0
          for f in docker/*.py tests/*.py; do
              if [ -f "$f" ]; then
                  echo "compiling $f"
                  if ! python -m py_compile "$f"; then
                      echo "::error file=$f::py_compile failed"
                      fail=1
                  fi
              fi
          done
          exit $fail

      # Validate the embedded Python heredocs inside test_locally.sh.
      # Pure-Python implementation: BSD csplit on macOS lacks GNU's -z/-b
      # flags, and Windows has neither csplit nor sed -i. py_compile-ing
      # each heredoc lets us catch syntax bugs in the Dockerized notebook
      # patches before the full Docker build sees them.
      - name: validate embedded python in test_locally.sh
        shell: bash
        run: |
          python - <<'PY'
          import ast, pathlib, re, sys
          src = pathlib.Path("docker/test_locally.sh").read_text()
          # Match `python - <<'PY'` ... `PY` blocks. The closing PY must be
          # on its own line (heredoc rules).
          blocks = re.findall(r"<<\s*'PY'\n(.*?)\nPY\b", src, flags=re.DOTALL)
          if not blocks:
              print("no PY heredocs found in docker/test_locally.sh -- skipping")
              sys.exit(0)
          print(f"found {len(blocks)} python heredoc(s)")
          failed = 0
          for i, blk in enumerate(blocks, 1):
              try:
                  ast.parse(blk)
                  print(f"  heredoc #{i}: OK ({blk.count(chr(10))+1} lines)")
              except SyntaxError as e:
                  print(f"::error::heredoc #{i} in docker/test_locally.sh: {e}")
                  failed += 1
          sys.exit(failed)
          PY

      # Functional (not just parse) check of the notebook/Studio helpers on
      # every OS: Colab cell-magic hoist, README folder naming, Colab-intro +
      # widget-output stripping, sidecar-log gating, plus the shipped JupyterLab
      # overrides / labextension plugins / login branding assets. Pure stdlib,
      # no Docker or GPU, so it runs identically on Linux, macOS and Windows.
      - name: validate Studio/notebook features
        shell: bash
        run: python tests/validate_studio_features.py

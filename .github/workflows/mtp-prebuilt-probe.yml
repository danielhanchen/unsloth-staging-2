# Direct-download the Unsloth prebuilt llama-server on each OS and
# confirm it advertises the MTP spec-type alias the Studio emit path
# expects. Skips install.sh / install.ps1 entirely so a stale frontend
# in this staging fork does not block the binary probe.

name: MTP prebuilt probe

on:
  push:
    branches: [studio-mtp-ci]
    paths:
      - 'studio/backend/core/inference/llama_cpp.py'
      - '.github/workflows/mtp-prebuilt-probe.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PREBUILT_TAG: b9204

jobs:
  probe-linux:
    name: Probe llama-server (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev libssl-dev

      - name: Download prebuilt llama-server
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prebuilt && cd prebuilt
          curl -fsSL -o app.tar.gz "https://github.com/unslothai/llama.cpp/releases/download/${PREBUILT_TAG}/app-${PREBUILT_TAG}-linux-x64-cuda12-portable.tar.gz"
          tar -xzf app.tar.gz
          ls -la

      - name: Probe llama-server for MTP spec advertisement
        run: |
          BIN=$(find prebuilt -name llama-server -type f -perm -u+x | head -1)
          test -n "$BIN" || { echo "llama-server not found"; find prebuilt -type f | head; exit 1; }
          HELP=$("$BIN" --help 2>&1 || true)
          echo "$HELP" | grep -E "^\s*--spec-type" | head -2
          echo "$HELP" | grep -E "^\s*--spec-type" | grep -E "draft-mtp|[|,\\[]mtp[|,\\]]"
          echo "$HELP" | grep -E "^\s*--spec-draft-n-max" >/dev/null
          echo "$HELP" | grep -E "^\s*--spec-draft-p-min" >/dev/null
          echo "$HELP" | grep -E "^\s*--spec-ngram-mod-n-(match|min|max)" | wc -l

  probe-macos:
    name: Probe llama-server (macos-14)
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Download prebuilt llama-server
        run: |
          # macOS prebuilt is named differently in the b9204 release; if
          # there is no -macos asset we skip with a clear message.
          mkdir -p prebuilt && cd prebuilt
          set +e
          curl -fsSL --retry 3 -o app.tar.gz "https://github.com/unslothai/llama.cpp/releases/download/${PREBUILT_TAG}/app-${PREBUILT_TAG}-macos-arm64.tar.gz"
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            echo "No prebuilt macOS arm64 asset for ${PREBUILT_TAG}. Listing assets:"
            curl -fsSL "https://api.github.com/repos/unslothai/llama.cpp/releases/tags/${PREBUILT_TAG}" | grep '"name":'
            echo "::warning::macOS prebuilt asset not available; skipping probe."
            exit 0
          fi
          tar -xzf app.tar.gz
          ls -la

      - name: Probe llama-server for MTP spec advertisement
        run: |
          BIN=$(find prebuilt -name llama-server -type f 2>/dev/null | head -1)
          if [ -z "$BIN" ]; then
            echo "::warning::no llama-server in prebuilt directory; skip"
            exit 0
          fi
          chmod +x "$BIN" 2>/dev/null || true
          HELP=$("$BIN" --help 2>&1 || true)
          echo "$HELP" | grep -E "^\s*--spec-type" | head -2
          echo "$HELP" | grep -E "^\s*--spec-type" | grep -E "draft-mtp|[|,\\[]mtp[|,\\]]"
          echo "$HELP" | grep -E "^\s*--spec-draft-n-max" >/dev/null
          echo "$HELP" | grep -E "^\s*--spec-draft-p-min" >/dev/null

  probe-windows:
    name: Probe llama-server (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Download prebuilt llama-server
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path prebuilt | Out-Null
          $url = "https://github.com/unslothai/llama.cpp/releases/download/$env:PREBUILT_TAG/app-$env:PREBUILT_TAG-win-x64-cuda12.zip"
          try {
            Invoke-WebRequest -Uri $url -OutFile prebuilt/app.zip -UseBasicParsing
          } catch {
            Write-Host "No Windows prebuilt asset for $env:PREBUILT_TAG. Listing assets:"
            $assets = Invoke-RestMethod -Uri "https://api.github.com/repos/unslothai/llama.cpp/releases/tags/$env:PREBUILT_TAG"
            $assets.assets | ForEach-Object { Write-Host $_.name }
            Write-Host "::warning::Windows prebuilt asset not available; skipping probe."
            exit 0
          }
          Expand-Archive -Path prebuilt/app.zip -DestinationPath prebuilt
          Get-ChildItem prebuilt -Recurse | Select-Object -First 20

      - name: Probe llama-server for MTP spec advertisement
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path prebuilt -Recurse -Filter llama-server.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $bin) {
            Write-Host "::warning::no llama-server.exe in prebuilt; skip"
            exit 0
          }
          $help = & $bin.FullName --help 2>&1 | Out-String
          $specLine = ($help -split "`n") | Where-Object { $_ -match '^\s*--spec-type' } | Select-Object -First 1
          if (-not $specLine) { throw "no --spec-type line in help" }
          Write-Host $specLine
          if ($specLine -notmatch 'draft-mtp|[|,\[]mtp[|,\]]') { throw "spec-type does not advertise draft-mtp / mtp" }
          if (-not ($help -match '--spec-draft-n-max')) { throw "missing --spec-draft-n-max" }
          if (-not ($help -match '--spec-draft-p-min')) { throw "missing --spec-draft-p-min" }

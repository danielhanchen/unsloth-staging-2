# Direct-download the Unsloth prebuilt llama-server on each OS and
# confirm it advertises the MTP spec-type alias the Studio emit path
# expects. Skips install.sh / install.ps1 entirely so a stale frontend
# in this staging fork does not block the binary probe.

name: MTP prebuilt probe

on:
  push:
    branches: [studio-mtp-ci]
    paths:
      - 'studio/backend/core/inference/llama_cpp.py'
      - '.github/workflows/mtp-prebuilt-probe.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PREBUILT_TAG: b9204

jobs:
  probe-linux:
    name: Probe llama-server (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev libssl-dev

      - name: Download prebuilt llama-server
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prebuilt && cd prebuilt
          curl -fsSL -o app.tar.gz "https://github.com/unslothai/llama.cpp/releases/download/${PREBUILT_TAG}/app-${PREBUILT_TAG}-linux-x64-cuda12-portable.tar.gz"
          tar -xzf app.tar.gz
          ls -la

      - name: Probe llama-server for MTP spec advertisement
        run: |
          BIN=$(find prebuilt -name llama-server -type f -perm -u+x | head -1)
          test -n "$BIN" || { echo "llama-server not found"; find prebuilt -type f | head; exit 1; }
          HELP=$("$BIN" --help 2>&1 || true)
          echo "$HELP" | grep -E "^\s*--spec-type" | head -2
          echo "$HELP" | grep -E "^\s*--spec-type" | grep -E "draft-mtp|[|,\\[]mtp[|,\\]]"
          echo "$HELP" | grep -E "^\s*--spec-draft-n-max" >/dev/null
          echo "$HELP" | grep -E "^\s*--spec-draft-p-min" >/dev/null
          echo "$HELP" | grep -E "^\s*--spec-ngram-mod-n-(match|min|max)" | wc -l

  # Note: Unsloth only publishes Linux-x64-CUDA prebuilts at this tag.
  # macOS / Windows builds llama-server from source via install.sh /
  # install.ps1 at user install time. Cross-OS argv coverage for the
  # MTP emit path is enforced by `MTP tests CI`, which runs the Python
  # unit suite on all three OSes.

# Probe the Unsloth prebuilt llama.cpp on each OS to confirm it
# advertises the MTP spec-type alias the Studio emit path expects.
#
# We grep llama-server --help for "--spec-type" and assert the
# advertised list contains either "draft-mtp" or "mtp". This is
# what probe_server_capabilities() does at runtime; running it on
# CI catches a prebuilt regression before users see it.

name: MTP prebuilt probe

on:
  push:
    branches: [studio-mtp-ci]
    paths:
      - 'studio/backend/core/inference/llama_cpp.py'
      - 'install.sh'
      - 'install.ps1'
      - '.github/workflows/mtp-prebuilt-probe.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  probe-linux:
    name: Probe llama-server (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev jq

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Studio (no torch)
        env:
          UNSLOTH_STUDIO_HOME: ${{ github.workspace }}/studio-home
        run: |
          mkdir -p "$UNSLOTH_STUDIO_HOME"
          ./install.sh --local --no-torch

      - name: Probe llama-server for MTP spec advertisement
        env:
          UNSLOTH_STUDIO_HOME: ${{ github.workspace }}/studio-home
        run: |
          BIN="$UNSLOTH_STUDIO_HOME/llama.cpp/build/bin/llama-server"
          test -x "$BIN" || { echo "llama-server not found at $BIN"; exit 1; }
          HELP=$("$BIN" --help 2>&1 || true)
          echo "$HELP" | grep -E "\\-\\-spec-type" | head -5
          echo "$HELP" | grep -E "\\-\\-spec-type" | grep -E "draft-mtp|[|,\\[]mtp[|,\\]]"
          echo "$HELP" | grep -E "\\-\\-spec-draft-n-max" >/dev/null || \
            { echo "missing --spec-draft-n-max"; exit 1; }

  probe-macos:
    name: Probe llama-server (macos-14)
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Studio (no torch)
        env:
          UNSLOTH_STUDIO_HOME: ${{ github.workspace }}/studio-home
        run: |
          mkdir -p "$UNSLOTH_STUDIO_HOME"
          ./install.sh --local --no-torch

      - name: Probe llama-server for MTP spec advertisement
        env:
          UNSLOTH_STUDIO_HOME: ${{ github.workspace }}/studio-home
        run: |
          # macOS prebuilt drops binaries under a flat layout. Search.
          BIN=$(find "$UNSLOTH_STUDIO_HOME/llama.cpp" -name llama-server -type f 2>/dev/null | head -1)
          test -n "$BIN" && test -x "$BIN" || { echo "llama-server not found under $UNSLOTH_STUDIO_HOME/llama.cpp"; ls -R "$UNSLOTH_STUDIO_HOME/llama.cpp" || true; exit 1; }
          HELP=$("$BIN" --help 2>&1 || true)
          echo "$HELP" | grep -E "\\-\\-spec-type" | head -5
          echo "$HELP" | grep -E "\\-\\-spec-type" | grep -E "draft-mtp|[|,\\[]mtp[|,\\]]"
          echo "$HELP" | grep -E "\\-\\-spec-draft-n-max" >/dev/null || \
            { echo "missing --spec-draft-n-max"; exit 1; }

  probe-windows:
    name: Probe llama-server (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Studio (no torch)
        env:
          UNSLOTH_STUDIO_HOME: ${{ github.workspace }}\studio-home
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:UNSLOTH_STUDIO_HOME
          .\install.ps1 -Local -NoTorch

      - name: Probe llama-server for MTP spec advertisement
        env:
          UNSLOTH_STUDIO_HOME: ${{ github.workspace }}\studio-home
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path "$env:UNSLOTH_STUDIO_HOME\llama.cpp" -Recurse -Filter llama-server.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $bin) { Get-ChildItem -Path "$env:UNSLOTH_STUDIO_HOME\llama.cpp" -Recurse; throw "llama-server.exe not found" }
          $help = & $bin.FullName --help 2>&1 | Out-String
          $specLine = ($help -split "`n") | Where-Object { $_ -match '--spec-type' } | Select-Object -First 1
          if (-not $specLine) { throw "no --spec-type line in help" }
          Write-Host $specLine
          if ($specLine -notmatch 'draft-mtp|[|,\[]mtp[|,\]]') { throw "spec-type does not advertise draft-mtp / mtp" }
          if (-not ($help -match '--spec-draft-n-max')) { throw "missing --spec-draft-n-max" }

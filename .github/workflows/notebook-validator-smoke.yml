name: notebook-validator-smoke

on:
  workflow_dispatch:
    inputs:
      notebook_glob:
        description: Glob for notebooks to validate
        required: false
        default: "**/*.ipynb"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbformat pyyaml

      - name: Run notebook validator
        env:
          PYTHONPATH: tests
        run: |
          cat > tests/_apply_spoof.py <<'PY'
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path(__file__).resolve().parent))
          import _zoo_aggressive_cuda_spoof as _spoof
          _spoof.apply()
          PY
          python -c "import _apply_spoof"  # ensure spoof importable
          python scripts/notebook_validator.py --help || true
          python scripts/notebook_validator.py "${{ inputs.notebook_glob }}" || true

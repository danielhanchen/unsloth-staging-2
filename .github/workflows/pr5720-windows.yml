name: PR5720 windows

on:
  push:
    branches: [pr5720-cross-os]
    paths:
      - 'studio/backend/**'
      - 'studio/desktop/**'
      - '.github/workflows/pr5720-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/backend/**'
      - '.github/workflows/pr5720-windows.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}\studio
      UNSLOTH_COMPILE_DISABLE: '1'
      UNSLOTH_IS_PRESENT: '1'
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimal backend test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'fastapi==0.115.6' 'starlette<0.42' \
            'httpx==0.27.2' 'httpx-sse==0.4.0' \
            'pydantic>=2.9,<3' 'pydantic-settings>=2.5,<3' \
            'sqlalchemy<3' 'sqlmodel<1' \
            'cryptography>=43' 'pyjwt>=2.9' 'bcrypt>=4.2' \
            'pytest==9.0.3' pytest-asyncio pytest-timeout \
            'numpy<3' 'pyyaml>=6' 'requests>=2.32' 'jinja2>=3' \
            'python-multipart>=0.0.12' 'email-validator>=2.2'

      - name: Show env
        shell: bash
        run: |
          python -V
          python -c "import sys; print(sys.platform)"
          pip list 2>/dev/null | head -40

      - name: Run Gemini provider backend tests
        shell: bash
        run: |
          python -m pytest -v --tb=short --timeout=60 \
            studio/backend/tests/test_gemini_provider.py \
            studio/backend/tests/test_external_provider_usage_chunk.py \
            studio/backend/tests/test_providers_api.py

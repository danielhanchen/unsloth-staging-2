# SPDX-License-Identifier: AGPL-3.0-only
#
# PR #5727 cross-platform parse/import smoke (Linux).
#
# The PR's change is gated on _IS_MLX which is False on Linux, so the
# patched lines never execute here. This job exists to catch syntax /
# indentation / kwarg regressions in studio/backend/core/export/export.py
# and to confirm the file still imports cleanly with the rest of the
# Studio backend on a CUDA-spoofed non-MLX target. We deliberately do
# NOT install mlx -- the goal is to ensure the file is a clean Python
# module on Linux+spoof, the same condition CI hits for non-Mac PRs.
#
# Runs both tests/studio/test_export_output_path_contract.py (the
# existing AST contract gate) and tests/studio/test_pr5727_export_kwargs.py
# (the new PR-specific gate). tests/conftest.py:140 pre-spoofs
# unsloth_zoo.device_type under torch.cuda.is_available=True so
# `import unsloth` survives on a runner with no real accelerator.

name: PR5727 Linux import smoke

on:
  push:
    branches:
      - 'pr5727-validate-**'
    paths:
      - 'studio/backend/core/export/export.py'
      - 'tests/studio/test_export_output_path_contract.py'
      - 'tests/studio/test_pr5727_export_kwargs.py'
      - 'tests/conftest.py'
      - '.github/workflows/pr5727-linux-import.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  parse-and-import:
    name: parse-and-import
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install minimum import deps
        run: |
          python -m pip install --upgrade pip
          pip install -r studio/backend/requirements/studio.txt
          pip install \
            python-multipart aiofiles sqlalchemy cryptography \
            pyyaml jinja2 mammoth unpdf requests \
            'numpy<3' pytest pytest-asyncio httpx
          pip install --index-url https://download.pytorch.org/whl/cpu \
            'torch>=2.4,<2.11'
          pip install 'transformers>=4.51,<5.5'
          for attempt in 1 2 3; do
            if pip install "unsloth_zoo @ git+https://github.com/unslothai/unsloth-zoo"; then
              break
            fi
            sleep $((5 * attempt))
          done
          pip install -e . --no-deps

      - name: Run PR5727 + export contract tests (pytest, conftest spoof)
        env:
          PYTHONPATH: ${{ github.workspace }}/studio
        run: |
          python -m pytest -v --tb=short \
            tests/studio/test_export_output_path_contract.py \
            tests/studio/test_pr5727_export_kwargs.py

name: studio-install-macos

on:
  push:
    branches: [studio-install-cross-os]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-from-source:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Clone unsloth (main = latest/nightly source)
        run: git clone --depth 1 https://github.com/unslothai/unsloth

      - name: Developer install from source (./install.sh --local)
        run: |
          cd unsloth
          UNSLOTH_STUDIO_HOME="$PWD/.studio" NO_COLOR=1 ./install.sh --local

      - name: Launch Studio (loopback) and health-check
        run: |
          cd unsloth
          export UNSLOTH_STUDIO_HOME="$PWD/.studio"
          "$UNSLOTH_STUDIO_HOME/bin/unsloth" studio -p 8899 > studio.log 2>&1 &
          SPID=$!
          ok=0
          for i in $(seq 1 150); do
            if curl -fsS http://127.0.0.1:8899/api/health > /dev/null 2>&1; then ok=1; break; fi
            sleep 4
          done
          echo "----- studio.log (tail) -----"
          tail -80 studio.log || true
          kill "$SPID" 2>/dev/null || true
          if [ "$ok" = "1" ]; then
            echo "RESULT: STUDIO HEALTHY (macos)"
          else
            echo "RESULT: STUDIO NOT HEALTHY (macos)"; exit 1
          fi

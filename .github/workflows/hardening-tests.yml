name: Sandbox hardening tests (Patches A / B / D)

on:
  push:
    branches:
      - "sandbox-hardening-ci-*"
    paths:
      - "hardening_ci/**"
      - ".github/workflows/hardening-tests.yml"
  pull_request:
    paths:
      - "hardening_ci/**"
      - ".github/workflows/hardening-tests.yml"
  workflow_dispatch:

concurrency:
  group: hardening-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        shell: bash
        run: python -m pip install --upgrade pip pytest
      - name: Confirm patched helpers import
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/hardening_ci/backend
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'hardening_ci/backend')
          from core.inference.tools import (
              _check_code_safety,
              _find_sensitive_paths,
              _find_blocked_commands,
          )
          # spot-check Patch A
          assert _check_code_safety(\"open('/etc/' + 'shadow')\") is not None, 'Patch A failed'
          # spot-check Patch B (home-anchored)
          assert _find_sensitive_paths('cat ~/.ssh/id_rsa'), 'Patch B failed'
          # spot-check Patch B (legitimate must remain allowed)
          assert not _find_sensitive_paths('cat ~/.gitconfig'), 'Patch B false-positive'
          assert not _find_sensitive_paths('cat ./project/.npmrc'), 'Patch B false-positive'
          # spot-check Patch D
          assert _check_code_safety(\"exec(\\\"open('/etc/shadow').read()\\\")\") is not None, 'Patch D failed'
          # spot-check legitimate eval/exec
          assert _check_code_safety(\"eval('1 + 2')\") is None, 'Patch D over-blocks'
          print('All four spot-checks pass on', sys.platform)
          "
      - name: Run upstream test_sandbox_tools.py
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/hardening_ci/backend
        run: python -m pytest hardening_ci/backend/tests/test_sandbox_tools.py -v --tb=short
      - name: Run hardening regression suite
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/hardening_ci/backend
        run: python -m pytest hardening_ci/backend/tests/test_sandbox_hardening.py -v --tb=short

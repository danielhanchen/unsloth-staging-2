# Windows is the highest-value leg: start.py's _print_env emits PowerShell
# ($env:NAME / Remove-Item) instead of POSIX export/unset, and the session
# config uses tempfile.mkdtemp + Path with backslashes. test_start.py asserts
# the per-OS form via os.name, so this exercises the native Windows branch.
name: PR-6613 session-scope windows-latest
on:
  push:
    branches: [pr6613-session-scope-cross-os]
    paths:
      - 'unsloth_cli/**'
      - '.github/workflows/pr6613-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'unsloth_cli/**'
      - '.github/workflows/pr6613-windows.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  start-cli:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - name: Install minimal deps
        run: python -m pip install typer rich pydantic pyyaml pytest pytest-timeout
      - name: Unit tests (unsloth start session config)
        run: python -m pytest unsloth_cli/tests/test_start.py -q

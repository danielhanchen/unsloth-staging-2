# Staging-only: prove the llama.cpp prebuilt installs with NO GitHub token.
# GH_TOKEN/GITHUB_TOKEN are blanked for every step so we exercise the exact
# anonymous path that used to 403 on api.github.com and fall back to source build.
name: "tokenless-linux"

on:
  push:
    branches: [pr-llama-tokenless-cross-os]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prebuilt:
    name: tokenless prebuilt (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ''
      GITHUB_TOKEN: ''
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Linux runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4 libgomp1

      - name: Tokenless prebuilt install
        run: |
          set -o pipefail
          mkdir -p logs
          unset GH_TOKEN GITHUB_TOKEN
          python studio/install_llama_prebuilt.py \
            --install-dir "$RUNNER_TEMP/llama" \
            --llama-tag latest \
            --published-repo ggml-org/llama.cpp \
            --simple-policy 2>&1 | tee logs/install.log
          rc=${PIPESTATUS[0]}
          echo "installer rc=$rc"
          test "$rc" = "0"

      - name: Assert prebuilt via redirect, no token, no fallback
        run: |
          grep -q "via release redirect" logs/install.log || { echo "::error::redirect resolver not used"; exit 1; }
          ! grep -qi "falling back to source build" logs/install.log || { echo "::error::fell back to source build"; exit 1; }
          ! grep -q "GitHub API returned 403" logs/install.log || { echo "::error::api.github.com 403 leaked"; exit 1; }
          info="$RUNNER_TEMP/llama/UNSLOTH_PREBUILT_INFO.json"
          test -f "$info" || { echo "::error::no UNSLOTH_PREBUILT_INFO.json"; exit 1; }
          python - "$info" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1]))
          print("INFO:", json.dumps({k: d.get(k) for k in ("asset","tag","source","prebuilt_fallback_used")}))
          sys.exit(0 if d.get("prebuilt_fallback_used") is False else 1)
          PY

      - name: Dump installer log + install dir
        if: always()
        run: |
          echo "----- install.log (tail) -----"
          tail -150 logs/install.log 2>&1 || echo "no install.log"
          echo "----- install dir listing -----"
          ls -la "$RUNNER_TEMP/llama" 2>&1 || echo "no install dir"

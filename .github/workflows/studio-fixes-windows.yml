name: Studio-fixes windows-latest
on:
  push:
    branches: [pr-studio-fixes-cross-os]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: studio/backend
      UNSLOTH_COMPILE_DISABLE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pytest pytest-asyncio pytest-timeout structlog
      - name: Studio fix tests + cross-platform simulation matrix
        # Deselect 3 pre-existing POSIX-only tests (exec-bit chmod + tar symlink
        # path rejection) that are unrelated to these fixes and cannot pass on
        # Windows by design.
        run: >-
          python -m pytest
          studio/backend/tests/test_llama_cpp_update.py
          studio/backend/tests/test_llama_cpp_freshness.py
          studio/backend/tests/test_cloudflare_tunnel.py
          tests/studio/install/test_install_llama_prebuilt_logic.py
          temp/sim/test_sim_matrix.py
          --deselect studio/backend/tests/test_cloudflare_tunnel.py::test_ensure_downloads_and_chmods_when_missing
          --deselect studio/backend/tests/test_cloudflare_tunnel.py::test_ensure_macos_extracts_tgz_and_chmods
          --deselect tests/studio/install/test_install_llama_prebuilt_logic.py::test_extract_archive_rejects_absolute_tar_symlink_target
          -q

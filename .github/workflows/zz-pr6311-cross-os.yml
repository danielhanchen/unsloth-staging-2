# SPDX-License-Identifier: AGPL-3.0-only
# Cross-OS validation of PR #6311 (route all llama.cpp prebuilts to the fork).
# Per OS: (1) the routing-logic unit tests #6311 touches, and (2) a LIVE
# `install_llama_prebuilt.py --resolve-prebuilt latest` probe against the fork's
# real releases -- reports prebuilt_available / asset / install_kind so the
# arm64-CPU "fork hasn't published the bundle yet" sequencing risk is visible.
name: "pr6311 cross-os validation"

on:
  push:
    branches: [pr6311-validation]
  pull_request:
    branches: [pr6311-base]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  resolve:
    name: "resolve @ ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest        # x86_64 CPU Linux
          - ubuntu-24.04-arm     # arm64 CPU Linux (new fork linux-arm64 bundle)
          - windows-latest       # x86_64 CPU Windows
          - windows-11-arm       # arm64 Windows (new windows-arm64 kind)
          - macos-14             # arm64 macOS (already on the fork)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install probe/test deps
        run: python -m pip install --upgrade pip pytest huggingface_hub packaging requests

      - name: Routing-logic unit tests
        run: |
          python -m pytest -q --tb=short \
            studio/backend/tests/test_install_resolve_prebuilt.py \
            tests/studio/install/test_selection_logic.py \
            tests/studio/install/test_install_llama_prebuilt_logic.py

      - name: Live --resolve-prebuilt probe (fork releases)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python studio/install_llama_prebuilt.py --resolve-prebuilt latest --output-format json \
            > resolve.out 2> resolve.err || true
          echo "----- resolver stderr (tail) -----"; tail -20 resolve.err || true
          python - <<'PY'
          import json
          last = ""
          try:
              for line in open("resolve.out"):
                  line = line.strip()
                  if line.startswith("{"):
                      last = line
          except FileNotFoundError:
              pass
          print("RAW:", last or "<no JSON emitted>")
          if last:
              try:
                  d = json.loads(last)
                  print(f"REPO={d.get('repo')}")
                  print(f"PREBUILT_AVAILABLE={d.get('prebuilt_available')}")
                  print(f"ASSET={d.get('asset')}")
                  print(f"INSTALL_KIND={d.get('install_kind')}")
                  print(f"RELEASE_TAG={d.get('release_tag')}")
                  if d.get("prebuilt_available") is not True:
                      print("NOTE: no fork prebuilt resolved for this host -> source-build "
                            "fallback. If this is an arm64/CPU host, the fork release may not "
                            "have published the bundle yet (sequencing).")
              except Exception as e:
                  print("could not parse resolver JSON:", e)
          PY

      - name: Upload resolver output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: resolve-${{ matrix.os }}
          path: |
            resolve.out
            resolve.err
          retention-days: 7

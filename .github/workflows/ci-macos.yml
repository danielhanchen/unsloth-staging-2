name: ci-macos
on:
  push:
    branches: [pr-studio-7fixes-ci]
  workflow_dispatch:
concurrency:
  group: ci-macos-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        working-directory: studio/backend
        run: python -m pip install -r requirements/studio.txt pytest pytest-asyncio pytest-timeout python-multipart
      - name: Run Studio PR backend tests
        working-directory: studio/backend
        env:
          PYTHONPATH: .
        run: python -m pytest tests/test_cloudflare_tunnel.py tests/test_secure_tunnel_gate.py tests/test_personalization_settings.py tests/test_model_idle_ttl.py tests/test_openai_catalog.py tests/test_model_ids.py tests/test_openai_models_path_leak.py tests/test_gguf_completion_usage.py tests/test_openai_tool_passthrough.py -q

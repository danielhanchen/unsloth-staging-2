# install.sh and uninstall.sh round-trip on a real macOS runner, plus the
# safety guards. Validates PR 5496's macOS launcher behaviour and PR
# 5497's uninstall.sh on Darwin.

name: Uninstall Mac CI

on:
  pull_request:
    paths:
      - 'install.sh'
      - 'uninstall.sh'
      - 'studio/setup.sh'
      - '.github/workflows/uninstall-mac.yml'
  push:
    branches: [main, studio-uninstall-ci]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast static + safety checks on the smaller macos-13 / Intel runner
  # (or macos-latest if that maps to ARM). No real install.
  safety-smoke:
    name: Uninstall safety guards
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Static checks
        run: |
          bash -n uninstall.sh && echo "bash -n OK"
          sh   -n uninstall.sh && echo "sh   -n OK"
          bash -n install.sh   && echo "install.sh bash -n OK"
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -s sh uninstall.sh || true
          fi
      - name: A. UNSLOTH_STUDIO_HOME=$HOME refused
        run: |
          STAGE="$RUNNER_TEMP/A"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          echo PRECIOUS > "$STAGE/PRECIOUS.txt"
          HOME="$STAGE" UNSLOTH_STUDIO_HOME="$STAGE" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          test -f "$STAGE/PRECIOUS.txt" && echo "PASS" || { echo "FAIL: PRECIOUS deleted"; exit 1; }
      - name: B. Non-Studio root refused
        run: |
          STAGE="$RUNNER_TEMP/B"
          rm -rf "$STAGE"; mkdir -p "$STAGE/proj/unsloth_studio/bin"
          touch "$STAGE/proj/unsloth_studio/bin/unsloth"
          echo important > "$STAGE/proj/important.txt"
          mkdir -p "$STAGE/H"
          HOME="$STAGE/H" UNSLOTH_STUDIO_HOME="$STAGE/proj" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          test -f "$STAGE/proj/important.txt" && echo "PASS" || { echo "FAIL"; exit 1; }
      - name: C. Canonicalised path that resolves to $HOME refused
        run: |
          STAGE="$RUNNER_TEMP/C"
          rm -rf "$STAGE"; mkdir -p "$STAGE/inner"
          echo precious > "$STAGE/inner/PRECIOUS.txt"
          # $HOME/../$(basename $HOME) canonicalises to $HOME
          HOME="$STAGE/inner" UNSLOTH_STUDIO_HOME="$STAGE/inner/../inner" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          test -f "$STAGE/inner/PRECIOUS.txt" && echo "PASS" || { echo "FAIL: canonicalisation failed"; exit 1; }
      - name: D. Real Studio root removed
        run: |
          STAGE="$RUNNER_TEMP/D"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/H" "$STAGE/studio/unsloth_studio/bin" "$STAGE/studio/share" "$STAGE/studio/bin"
          touch "$STAGE/studio/unsloth_studio/.unsloth-studio-owned"
          touch "$STAGE/studio/unsloth_studio/bin/unsloth"
          ln -sfn "$STAGE/studio/unsloth_studio/bin/unsloth" "$STAGE/studio/bin/unsloth"
          printf "UNSLOTH_EXE='%s'\n" "$STAGE/studio/unsloth_studio/bin/unsloth" > "$STAGE/studio/share/studio.conf"
          HOME="$STAGE/H" UNSLOTH_STUDIO_HOME="$STAGE/studio" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          test ! -e "$STAGE/studio" && echo "PASS" || { echo "FAIL: studio root remains"; exit 1; }
      - name: E. UNSLOTH_STUDIO_HOME precedence over STUDIO_HOME
        run: |
          STAGE="$RUNNER_TEMP/E"
          rm -rf "$STAGE"; mkdir -p "$STAGE/H"
          for n in A B; do
            mkdir -p "$STAGE/$n/unsloth_studio/bin" "$STAGE/$n/share" "$STAGE/$n/bin"
            touch "$STAGE/$n/unsloth_studio/.unsloth-studio-owned"
            touch "$STAGE/$n/unsloth_studio/bin/unsloth"
            printf "UNSLOTH_EXE='%s'\n" "$STAGE/$n/unsloth_studio/bin/unsloth" > "$STAGE/$n/share/studio.conf"
          done
          HOME="$STAGE/H" UNSLOTH_STUDIO_HOME="$STAGE/A" STUDIO_HOME="$STAGE/B" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          if [ ! -e "$STAGE/A" ] && [ -d "$STAGE/B" ]; then
            echo "PASS: only A removed (UNSLOTH_STUDIO_HOME wins)"
          else
            echo "FAIL: A=$([ -e "$STAGE/A" ] && echo exists || echo gone) B=$([ -e "$STAGE/B" ] && echo exists || echo gone)"
            exit 1
          fi
      - name: "F. Idempotency: 3 runs on empty $HOME"
        run: |
          STAGE="$RUNNER_TEMP/F"
          rm -rf "$STAGE"; mkdir -p "$STAGE"
          for i in 1 2 3; do
            HOME="$STAGE" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          done
          echo "PASS: 3 runs all exit 0"
      - name: G. macOS .app symlink-guard matrix
        # PR 5496 hardens install.sh so `mkdir -p` does not follow a
        # symlinked .app into someone else's tree. PR 5497's uninstaller
        # must also unlink the symlink itself, never recurse into its
        # target. Four scenarios, four staged $HOMEs.
        run: |
          set -e
          # G1. .app is a REAL directory: removed.
          S="$RUNNER_TEMP/G1"; rm -rf "$S"; mkdir -p "$S/Applications/Unsloth Studio.app/Contents/MacOS"
          touch "$S/Applications/Unsloth Studio.app/Contents/MacOS/Unsloth Studio"
          HOME="$S" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          [ ! -e "$S/Applications/Unsloth Studio.app" ] && echo "G1 PASS" || { echo "G1 FAIL"; ls -la "$S/Applications"; exit 1; }
          # G2. .app is a symlink to an UNRELATED real dir: symlink unlinked, target preserved.
          S="$RUNNER_TEMP/G2"; rm -rf "$S"; mkdir -p "$S/Applications" "$S/other/innocent"
          echo precious > "$S/other/innocent/file"
          ln -sfn "$S/other/innocent" "$S/Applications/Unsloth Studio.app"
          HOME="$S" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          if [ -e "$S/Applications/Unsloth Studio.app" ] || [ ! -f "$S/other/innocent/file" ]; then
            echo "G2 FAIL"; ls -la "$S/Applications" "$S/other/innocent"; exit 1
          fi
          echo "G2 PASS (symlink removed, target preserved)"
          # G3. .app is a BROKEN symlink: removed.
          S="$RUNNER_TEMP/G3"; rm -rf "$S"; mkdir -p "$S/Applications"
          ln -sfn "$S/does/not/exist" "$S/Applications/Unsloth Studio.app"
          HOME="$S" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          [ ! -L "$S/Applications/Unsloth Studio.app" ] && [ ! -e "$S/Applications/Unsloth Studio.app" ] \
            && echo "G3 PASS" || { echo "G3 FAIL"; ls -la "$S/Applications"; exit 1; }
          # G4. .app is a REGULAR FILE (corrupt prior install): removed.
          S="$RUNNER_TEMP/G4"; rm -rf "$S"; mkdir -p "$S/Applications"
          echo notabundle > "$S/Applications/Unsloth Studio.app"
          HOME="$S" XDG_RUNTIME_DIR="" sh ./uninstall.sh
          [ ! -e "$S/Applications/Unsloth Studio.app" ] && echo "G4 PASS" || { echo "G4 FAIL"; ls -la "$S/Applications"; exit 1; }
      - name: H. Studio lock-dir cleanup
        # uninstall.sh should remove $XDG_RUNTIME_DIR/unsloth-studio-* and
        # /tmp/unsloth-studio-* lock dirs. macos-14 has no XDG_RUNTIME_DIR
        # by default, so we point one at $RUNNER_TEMP for this test.
        run: |
          S="$RUNNER_TEMP/H"; rm -rf "$S"
          mkdir -p "$S/H" "$S/run/unsloth-studio-8888" "$S/run/unsloth-studio-9999" \
                   "$S/tmp/unsloth-studio-8888" "$S/tmp/unsloth-studio-7777"
          # Sentinel inside one lock to confirm recursive removal.
          touch "$S/run/unsloth-studio-8888/PID" "$S/tmp/unsloth-studio-7777/PID"
          HOME="$S/H" XDG_RUNTIME_DIR="$S/run" TMPDIR="$S/tmp" sh ./uninstall.sh
          # Report what is left (uninstaller may not currently clean both
          # paths -- this step never fails the build; it surfaces the
          # gap.)
          remain_run=$(find "$S/run" -maxdepth 1 -name 'unsloth-studio-*' 2>/dev/null | wc -l | tr -d ' ')
          remain_tmp=$(find "$S/tmp" -maxdepth 1 -name 'unsloth-studio-*' 2>/dev/null | wc -l | tr -d ' ')
          echo "XDG_RUNTIME_DIR lock leftover: $remain_run"
          echo "/tmp lock leftover:            $remain_tmp"
          if [ "$remain_run" -gt 0 ] || [ "$remain_tmp" -gt 0 ]; then
            echo "::warning::Studio lock-dir cleanup gap (uninstall.sh leaves $remain_run XDG + $remain_tmp TMP)"
            find "$S/run" "$S/tmp" -maxdepth 2 2>/dev/null || true
          else
            echo "PASS: all Studio lock dirs cleaned"
          fi

  # PR 5496's spawn-terminal failure-path test on real macOS. Verifies the
  # nohup'd Studio server gets reaped when `open -a Terminal` fails. We
  # don't run the full install; just exercise _spawn_terminal in isolation.
  spawn-terminal-orphan:
    name: PR 5496 _spawn_terminal failure-path cleanup
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Extract _spawn_terminal and exercise the open-fails path
        run: |
          set -u
          WORK="$RUNNER_TEMP/spawn"
          rm -rf "$WORK"; mkdir -p "$WORK/data" "$WORK/mockbin"
          # Mock `open` to fail. `nohup`, `osascript`, `uname` are real on macOS.
          cat > "$WORK/mockbin/open" <<'EOF'
          #!/bin/sh
          echo "[mock-open] $*" >&2; exit 55
          EOF
          chmod +x "$WORK/mockbin/open"
          export PATH="$WORK/mockbin:$PATH"
          touch "$WORK/data/studio.log"
          awk '/^_spawn_terminal\(\) \{/{in_fn=1} in_fn{print} in_fn && /^\}/{exit}' install.sh > "$WORK/fn.sh"
          test -s "$WORK/fn.sh" || { echo "extract failed"; exit 1; }
          # Provide a benign $_cmd that just sleeps.
          DATA_DIR="$WORK/data" LOG_FILE="$WORK/data/studio.log" _launch_port=18888
          export DATA_DIR LOG_FILE _launch_port
          ( . "$WORK/fn.sh"; _spawn_terminal "sleep 30"; echo "rc=$?" )
          sleep 1
          # When open(1) fails, _spawn_terminal kills the original nohup'd
          # sleep, then falls back to a background launch that spawns exactly
          # ONE replacement. If the original were not reaped we would see 2
          # processes; we assert <=1 to allow the legitimate fallback.
          alive=$(pgrep -f 'sleep 30' | wc -l | tr -d ' ')
          if [ "$alive" -gt 1 ]; then
            echo "FAIL: $alive 'sleep 30' processes alive (expected <= 1)"
            pgrep -afl 'sleep 30'
            pkill -KILL -f 'sleep 30' 2>/dev/null || true
            exit 1
          fi
          pkill -KILL -f 'sleep 30' 2>/dev/null || true
          echo "PASS: at most one fallback daemon alive (original reaped)"

# Broad MLX notebook coverage: convert many migrated notebooks and run each
# end-to-end on a real macos-14 Apple Silicon runner, reporting a pass/fail
# matrix. Installs the PR heads + the seq2seq-collator fix, clones the notebooks
# PR, and runs tests/staging/mlx_notebook_smoke.py (report-only; one notebook
# failing does not abort the rest).

name: mlx-notebook-matrix macos-14

on:
  push:
    branches: [mlx-trainer-api-validation]
    paths:
      - 'tests/staging/mlx_notebook_smoke.py'
      - 'tests/staging/seq2seq_collator_mlx.patch'
      - 'tests/staging/chat_template_tokenizerwrapper_mlx.patch'
      - 'tests/staging/tokenizer_wrapper_mlx.patch'
      - 'tests/staging/bnb_name_remap_mlx.patch'
      - '.github/workflows/mlx-notebook-matrix-macos14.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notebook-matrix:
    name: mlx notebook matrix
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PR heads (+ seq2seq fix) with real MLX wheels
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.10.0'
          git clone --depth 1 -b mlx/trainer-api https://github.com/Lyxot/unsloth-zoo zoo
          git -C zoo apply "$GITHUB_WORKSPACE/tests/staging/tokenizer_wrapper_mlx.patch"
          git -C zoo apply "$GITHUB_WORKSPACE/tests/staging/bnb_name_remap_mlx.patch"
          pip install -e './zoo[mlx]'
          git clone --depth 1 -b mlx/trainer-api https://github.com/Lyxot/unsloth unsloth_src
          git -C unsloth_src apply "$GITHUB_WORKSPACE/tests/staging/seq2seq_collator_mlx.patch"
          git -C unsloth_src apply "$GITHUB_WORKSPACE/tests/staging/chat_template_tokenizerwrapper_mlx.patch"
          pip install --no-deps -e ./unsloth_src
          rm -rf "$GITHUB_WORKSPACE/unsloth"
          # peft: a real `pip install unsloth` pulls it; get_chat_template's
          # map_eos path imports unsloth.tokenizer_utils which imports peft.
          pip install datasets sentencepiece protobuf trl peft

      - name: Clone notebooks PR
        run: git clone --depth 1 -b mlx/trainer-api https://github.com/Lyxot/notebooks nb_repo

      - name: MLX notebook matrix (report-only)
        env:
          NB_DIR: ${{ github.workspace }}/nb_repo
        run: python tests/staging/mlx_notebook_smoke.py

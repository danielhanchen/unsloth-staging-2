name: "llama-update-cpu windows-latest"
on:
  push:
    branches: [llama-update-cpu-ci]
    paths:
      - 'studio/**'
      - '.github/workflows/cpu-update-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/**'
      - '.github/workflows/cpu-update-windows.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  cpu-update:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install structlog
      - run: python studio/backend/tests/cpu_update_e2e.py

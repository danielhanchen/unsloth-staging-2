# macOS leg: confirms tempfile/Path session-dir handling and the _claude_version
# subprocess probe behave on Darwin (BSD userland), and that the POSIX --no-launch
# print path matches on a non-Linux POSIX host.
name: PR-6613 session-scope macos-14
on:
  push:
    branches: [pr6613-session-scope-cross-os]
    paths:
      - 'unsloth_cli/**'
      - '.github/workflows/pr6613-macos.yml'
  pull_request:
    branches: [main]
    paths:
      - 'unsloth_cli/**'
      - '.github/workflows/pr6613-macos.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  start-cli:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - name: Install minimal deps
        run: python -m pip install typer rich pydantic pyyaml pytest pytest-timeout
      - name: Unit tests (unsloth start session config)
        run: python -m pytest unsloth_cli/tests/test_start.py -q

name: "local-agents-ci ubuntu-latest"

# Validates the Unsloth docs for driving local GGUF models with four coding
# agents (Pi, OpenAI Codex, Claude Code, OpenCode) against a locally-served
# Unsloth Studio endpoint. Studio is served with --disable-tools (passthrough)
# so each agent's own tools are relayed to it. CPU-only runner, tiny models.
# Throwaway staging workflow: never merged.

on:
  push:
    branches: [codex-guide-validation]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        agent: [pi, codex, claude-code, opencode]
        model:
          - { repo: "unsloth/Qwen3.5-2B-MTP-GGUF", variant: "UD-Q4_K_XL" }
          - { repo: "unsloth/gemma-4-E2B-it-GGUF", variant: "UD-Q4_K_XL" }
    name: ${{ matrix.agent }} / ${{ matrix.model.repo }}
    env:
      STUDIO_PORT: "8888"
      TASK_PROMPT: "Create a short Python Fibonacci function in a file called fib.py. Keep it under 15 lines."
    steps:
      - name: System info
        run: |
          set -x
          nproc; free -h; df -h / | tail -1
          node --version; npm --version; python3 --version

      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake build-essential libcurl4-openssl-dev jq

      - name: Install Unsloth Studio (guide step 1, released one-liner)
        run: |
          set -x +e
          curl -fsSL https://unsloth.ai/install.sh | sh 2>&1 | tee "$HOME/install.log" | tail -50
          UNSLOTH_BIN=""
          for c in "$HOME/.unsloth/studio/unsloth_studio/bin/unsloth" \
                   "$HOME/.local/bin/unsloth" "$(command -v unsloth || true)"; do
            if [ -n "$c" ] && [ -x "$c" ]; then UNSLOTH_BIN="$c"; break; fi
          done
          [ -n "$UNSLOTH_BIN" ] || UNSLOTH_BIN="$(find "$HOME/.unsloth" "$HOME/.local/bin" -maxdepth 5 -name unsloth -type f 2>/dev/null | head -1)"
          [ -n "$UNSLOTH_BIN" ] && [ -x "$UNSLOTH_BIN" ] || { echo "STUDIO INSTALL FAILED"; tail -150 "$HOME/install.log"; exit 1; }
          echo "$(dirname "$UNSLOTH_BIN")" >> "$GITHUB_PATH"

      - name: Serve model with --disable-tools (passthrough) + capture key/id
        run: |
          set -x +e
          cd "$HOME"
          SUB="run"; unsloth run --help >/dev/null 2>&1 || SUB="studio run"
          # --disable-tools => passthrough: the agent's own tools reach llama-server
          # and come back as structured tool calls the agent executes in its cwd.
          nohup unsloth $SUB --model "${{ matrix.model.repo }}:${{ matrix.model.variant }}" \
            --disable-tools -H 127.0.0.1 -p "$STUDIO_PORT" > "$HOME/studio.log" 2>&1 &
          echo "$!" > "$HOME/studio.pid"
          KEY=""
          for i in $(seq 1 120); do
            KEY=$(grep -oE "sk-unsloth-[A-Za-z0-9_-]+" "$HOME/studio.log" 2>/dev/null | head -1)
            [ -n "$KEY" ] && break
            kill -0 "$(cat "$HOME/studio.pid")" 2>/dev/null || { echo "studio exited early"; break; }
            sleep 5
          done
          tail -40 "$HOME/studio.log" 2>/dev/null
          [ -n "$KEY" ] || { echo "NO API KEY"; tail -200 "$HOME/studio.log" 2>/dev/null; exit 1; }
          echo "STUDIO_KEY=$KEY" >> "$GITHUB_ENV"
          MODEL_ID=""
          for i in $(seq 1 150); do
            MODEL_ID=$(curl -s -m 5 "http://127.0.0.1:$STUDIO_PORT/v1/models" -H "Authorization: Bearer $KEY" 2>/dev/null | jq -r '.data[0].id // empty' 2>/dev/null)
            [ -n "$MODEL_ID" ] && break
            sleep 5
          done
          [ -n "$MODEL_ID" ] || { echo "MODEL DID NOT LOAD"; tail -200 "$HOME/studio.log" 2>/dev/null; exit 1; }
          echo "MODEL_ID=$MODEL_ID" >> "$GITHUB_ENV"
          echo "Resolved MODEL_ID=$MODEL_ID"

      - name: Server-side API smoke (responses stream + messages)
        run: |
          set +e
          B="http://127.0.0.1:$STUDIO_PORT"; H="Authorization: Bearer $STUDIO_KEY"
          echo "### /v1/responses (stream) ###"
          curl -s -m 90 -N "$B/v1/responses" -H "$H" -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL_ID\",\"input\":\"Say hello in 3 words.\",\"stream\":true}" | head -c 600
          echo; echo "### /v1/messages ###"
          curl -s -m 90 "$B/v1/messages" -H "$H" -H "Content-Type: application/json" -H "anthropic-version: 2023-06-01" \
            -d "{\"model\":\"$MODEL_ID\",\"max_tokens\":32,\"messages\":[{\"role\":\"user\",\"content\":\"Say hello in 3 words.\"}]}" | head -c 600
          echo

      # ---------------- Pi ----------------
      - name: Pi - install + configure + run
        if: matrix.agent == 'pi'
        run: |
          set -x +e
          npm install -g @mariozechner/pi-coding-agent >/dev/null 2>&1
          mkdir -p "$HOME/.pi/agent"
          cat > "$HOME/.pi/agent/models.json" <<EOF
          {"providers":{"unsloth":{"baseUrl":"http://127.0.0.1:$STUDIO_PORT/v1","api":"openai-completions","apiKey":"$STUDIO_KEY","models":[{"id":"$MODEL_ID","input":["text"]}]}}}
          EOF
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q
          for attempt in 1 2 3; do
            rm -f fib.py
            echo "=== PI attempt $attempt ==="
            PI_OFFLINE=1 timeout 480 pi -p --provider unsloth --model "$MODEL_ID" "$TASK_PROMPT" 2>&1 | tee "$HOME/agent_out.log"
            grep -qiE "def fib|fibonacci" fib.py 2>/dev/null && break
          done

      # ---------------- Codex ----------------
      - name: Codex - install + configure + run (guide config)
        if: matrix.agent == 'codex'
        run: |
          set -x +e
          npm install -g @openai/codex >/dev/null 2>&1
          codex --version
          mkdir -p "$HOME/.codex" "$HOME/proj"
          export UNSLOTH_STUDIO_AUTH_TOKEN="$STUDIO_KEY"
          cat > "$HOME/.codex/config.toml" <<EOF
          oss_provider = "unsloth_api"

          [model_providers.unsloth_api]
          name                  = "Unsloth Studio"
          base_url              = "http://localhost:$STUDIO_PORT/v1"
          env_key               = "UNSLOTH_STUDIO_AUTH_TOKEN"
          wire_api              = "responses"
          requires_openai_auth  = false
          EOF
          cat > "$HOME/.codex/unsloth_api.config.toml" <<EOF
          model_provider = "unsloth_api"
          model = "$MODEL_ID"
          EOF
          cd "$HOME/proj" && git init -q
          for attempt in 1 2 3; do
            rm -f fib.py
            echo "=== CODEX attempt $attempt ==="
            timeout 420 codex exec --oss --profile unsloth_api --skip-git-repo-check \
              --dangerously-bypass-approvals-and-sandbox "$TASK_PROMPT" 2>&1 | tee "$HOME/agent_out.log"
            grep -qiE "def fib|fibonacci" fib.py 2>/dev/null && break
          done

      # ---------------- Claude Code ----------------
      - name: Claude Code - configure + run (env vars + bare + cache fix)
        if: matrix.agent == 'claude-code'
        run: |
          set -x +e
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 || curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          command -v claude || { echo "claude not on PATH"; ls -la "$HOME/.local/bin" 2>/dev/null; exit 1; }
          claude --version
          # Connection via env vars only (Ollama-style). ANTHROPIC_API_KEY="" stops
          # Claude prompting for a cloud key.
          export ANTHROPIC_BASE_URL="http://localhost:$STUDIO_PORT"
          export ANTHROPIC_AUTH_TOKEN="$STUDIO_KEY"
          export ANTHROPIC_API_KEY=""
          export ANTHROPIC_MODEL="$MODEL_ID"
          export ANTHROPIC_SMALL_FAST_MODEL="$MODEL_ID"
          export DISABLE_AUTOUPDATER=1
          # KV-cache fix (drop the per-request billing line) + telemetry off, passed
          # inline so no settings.json edit is needed.
          SETTINGS='{"env":{"CLAUDE_CODE_ATTRIBUTION_HEADER":"0","CLAUDE_CODE_ENABLE_TELEMETRY":"0","CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC":"1"}}'
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q
          # Fast integration probe: /v1/messages must relay the caller's tool as a
          # tool_use (decisive even when the full CPU loop is slow).
          cat > "$HOME/probe.json" <<EOF
          {"model":"$MODEL_ID","max_tokens":700,"tool_choice":{"type":"auto"},
           "tools":[{"name":"write_file","description":"Write text to a file",
             "input_schema":{"type":"object","properties":{
               "path":{"type":"string"},"content":{"type":"string"}},
               "required":["path","content"]}}],
           "messages":[{"role":"user","content":"Create fib.py containing a Python fibonacci function. Use the write_file tool."}]}
          EOF
          PROBE=$(curl -s -m 240 "http://localhost:$STUDIO_PORT/v1/messages" \
            -H "Authorization: Bearer $STUDIO_KEY" -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" -d @"$HOME/probe.json")
          echo "PROBE (head): $(echo "$PROBE" | head -c 800)"
          echo "$PROBE" | grep -q '"type"[[:space:]]*:[[:space:]]*"tool_use"' && touch "$HOME/proj/.integration_ok"
          # Real run: --bare (skip discovery) + --exclude-dynamic-system-prompt-sections
          # (cache reuse) + attribution off, with a retry.
          for attempt in 1 2; do
            rm -f fib.py
            echo "=== CLAUDE attempt $attempt ==="
            timeout 900 claude -p "$TASK_PROMPT" --model "$MODEL_ID" \
              --bare --exclude-dynamic-system-prompt-sections \
              --settings "$SETTINGS" --dangerously-skip-permissions 2>&1 | tee "$HOME/agent_out.log"
            grep -qiE "def fib|fibonacci" fib.py 2>/dev/null && break
          done

      # ---------------- OpenCode ----------------
      - name: OpenCode - install + configure + run
        if: matrix.agent == 'opencode'
        run: |
          set -x +e
          curl -fsSL https://opencode.ai/install | bash || npm install -g opencode-ai
          export PATH="$HOME/.opencode/bin:$HOME/.local/bin:$PATH"
          command -v opencode || { echo "opencode not on PATH"; ls -la "$HOME/.opencode/bin" 2>/dev/null; exit 1; }
          opencode --version
          mkdir -p "$HOME/.config/opencode"
          cat > "$HOME/.config/opencode/opencode.json" <<EOF
          {"\$schema":"https://opencode.ai/config.json",
           "permission":{"edit":"allow","bash":"allow","webfetch":"allow"},
           "provider":{"unsloth":{"npm":"@ai-sdk/openai-compatible","name":"Unsloth Studio",
             "options":{"baseURL":"http://127.0.0.1:$STUDIO_PORT/v1","apiKey":"$STUDIO_KEY"},
             "models":{"$MODEL_ID":{"name":"$MODEL_ID"}}}}}
          EOF
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q
          for attempt in 1 2 3; do
            rm -f fib.py
            echo "=== OPENCODE attempt $attempt ==="
            timeout 480 opencode run --model "unsloth/$MODEL_ID" "$TASK_PROMPT" 2>&1 | tee "$HOME/agent_out.log"
            grep -qiE "def fib|fibonacci" fib.py 2>/dev/null && break
          done

      - name: Diagnostics (always)
        if: always()
        run: |
          set +e
          echo "############ AGENT OUTPUT (tail) ############"
          tail -120 "$HOME/agent_out.log" 2>/dev/null || echo "(no agent output)"
          echo "############ integration signal ############"
          grep -iE "ECONNREFUSED|connection refused|401|403|unauthorized|404|not found|ollama|not running|timed out|invalid api key|model_not_found|session not found" \
            "$HOME/agent_out.log" 2>/dev/null | head -20 || echo "(no obvious errors)"
          echo "############ fib.py ? ############"
          if [ -f "$HOME/proj/fib.py" ]; then echo "CREATED:"; cat "$HOME/proj/fib.py"; else echo "NOT created"; fi
          echo "############ STUDIO LOG (tail) ############"
          tail -80 "$HOME/studio.log" 2>/dev/null || echo "(no studio log)"

      - name: Validate
        if: always()
        run: |
          set +e
          AG="${{ matrix.agent }}"; REPO="${{ matrix.model.repo }}"
          OK=1; REASON=""
          if grep -qiE "def fib|fibonacci" "$HOME/proj/fib.py" 2>/dev/null; then OK=0; REASON="fib.py created"; fi
          # Claude Code's full agentic loop is slow on a 2-vCPU runner; a relayed
          # tool_use over /v1/messages is the integration pass signal.
          if [ "$AG" = "claude-code" ] && [ -f "$HOME/proj/.integration_ok" ]; then
            OK=0; REASON="${REASON:+$REASON + }/v1/messages tool relay OK"
          fi
          if [ "$OK" -eq 0 ]; then
            echo "RESULT: PASS ($AG / $REPO) -- $REASON"
          else
            echo "RESULT: FAIL ($AG / $REPO) -- see diagnostics"; exit 1
          fi

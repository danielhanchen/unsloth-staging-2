name: "local-agents-ci ubuntu-latest"

# Validates the Unsloth docs for driving local GGUF models with three coding
# agents (Pi, OpenAI Codex, Claude Code) against a locally-served Unsloth Studio
# OpenAI/Anthropic-compatible endpoint. CPU-only runner, tiny target models.
# Throwaway staging workflow: never merged.

on:
  push:
    branches: [codex-guide-validation]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        agent: [pi, codex, claude-code]
        model:
          - { repo: "unsloth/Qwen3.5-2B-MTP-GGUF", variant: "UD-Q4_K_XL" }
          - { repo: "unsloth/gemma-4-E2B-it-GGUF", variant: "UD-Q4_K_XL" }
    name: ${{ matrix.agent }} / ${{ matrix.model.repo }}
    env:
      STUDIO_PORT: "8888"
      TASK_PROMPT: "Create a short Python Fibonacci function in a file called fib.py. Keep it under 15 lines."
    steps:
      - name: System info
        run: |
          set -x
          nproc; free -h; df -h / | tail -1
          node --version; npm --version; python3 --version

      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake build-essential libcurl4-openssl-dev jq

      - name: Install Unsloth Studio (guide step 1, released one-liner)
        run: |
          set -x
          curl -fsSL https://unsloth.ai/install.sh | sh 2>&1 | tee "$HOME/install.log" | tail -40
          echo "$HOME/.unsloth/studio/bin" >> "$GITHUB_PATH"
          ls -la "$HOME/.unsloth/studio/bin" || { echo "STUDIO INSTALL FAILED"; tail -120 "$HOME/install.log"; exit 1; }

      - name: Serve model + capture key/id (guide step 1, unsloth run)
        run: |
          set -x
          export PATH="$HOME/.unsloth/studio/bin:$PATH"
          nohup unsloth run --model "${{ matrix.model.repo }}:${{ matrix.model.variant }}" \
            -H 127.0.0.1 -p "$STUDIO_PORT" > "$HOME/studio.log" 2>&1 &
          echo "$!" > "$HOME/studio.pid"
          # wait for server up
          for i in $(seq 1 90); do
            grep -q "running on http://127.0.0.1:$STUDIO_PORT" "$HOME/studio.log" && break
            sleep 5
          done
          tail -30 "$HOME/studio.log" || true
          KEY=$(grep -oE "sk-unsloth-[a-f0-9]+" "$HOME/studio.log" | head -1)
          [ -n "$KEY" ] || { echo "NO API KEY -- studio did not start"; tail -120 "$HOME/studio.log"; exit 1; }
          echo "STUDIO_KEY=$KEY" >> "$GITHUB_ENV"
          # wait for model load
          for i in $(seq 1 90); do
            curl -s -m 5 "http://127.0.0.1:$STUDIO_PORT/v1/models" -H "Authorization: Bearer $KEY" | grep -q '"data"' && break
            sleep 5
          done
          MODEL_ID=$(curl -s "http://127.0.0.1:$STUDIO_PORT/v1/models" -H "Authorization: Bearer $KEY" | jq -r '.data[0].id')
          [ -n "$MODEL_ID" ] && [ "$MODEL_ID" != "null" ] || { echo "MODEL DID NOT LOAD"; tail -120 "$HOME/studio.log"; exit 1; }
          echo "MODEL_ID=$MODEL_ID" >> "$GITHUB_ENV"
          echo "Resolved MODEL_ID=$MODEL_ID"

      - name: Server-side API smoke (responses + messages)
        run: |
          B="http://127.0.0.1:$STUDIO_PORT"; H="Authorization: Bearer $STUDIO_KEY"
          echo "### /v1/responses (stream) ###"
          curl -s -m 60 -N "$B/v1/responses" -H "$H" -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL_ID\",\"input\":\"Say hello in 3 words.\",\"stream\":true}" | head -c 600 || true
          echo; echo "### /v1/messages ###"
          curl -s -m 60 "$B/v1/messages" -H "$H" -H "Content-Type: application/json" -H "anthropic-version: 2023-06-01" \
            -d "{\"model\":\"$MODEL_ID\",\"max_tokens\":32,\"messages\":[{\"role\":\"user\",\"content\":\"Say hello in 3 words.\"}]}" | head -c 600 || true
          echo

      # ---------------- Pi ----------------
      - name: Pi - install + configure + run
        if: matrix.agent == 'pi'
        run: |
          set -x
          npm install -g @mariozechner/pi-coding-agent >/dev/null 2>&1
          mkdir -p "$HOME/.pi/agent"
          cat > "$HOME/.pi/agent/models.json" <<EOF
          {"providers":{"unsloth":{"baseUrl":"http://127.0.0.1:$STUDIO_PORT/v1","api":"openai-completions","apiKey":"$STUDIO_KEY","models":[{"id":"$MODEL_ID","input":["text"]}]}}}
          EOF
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q && rm -f fib.py
          set +e
          PI_OFFLINE=1 timeout 600 pi -p --provider unsloth --model "$MODEL_ID" "$TASK_PROMPT" 2>&1 | tee "$HOME/agent_out.log"
          echo "PI EXIT: ${PIPESTATUS[0]}"

      # ---------------- Codex ----------------
      - name: Codex - install + configure + run (guide steps 2-4)
        if: matrix.agent == 'codex'
        run: |
          set -x
          npm install -g @openai/codex >/dev/null 2>&1
          codex --version
          mkdir -p "$HOME/.codex"
          cat > "$HOME/.codex/config.toml" <<EOF
          oss_provider = "unsloth_api"

          [model_providers.unsloth_api]
          name                  = "Unsloth Studio"
          base_url              = "http://localhost:$STUDIO_PORT/v1"
          env_key               = "UNSLOTH_STUDIO_AUTH_TOKEN"
          wire_api              = "responses"
          requires_openai_auth  = false
          EOF
          cat > "$HOME/.codex/unsloth_api.config.toml" <<EOF
          model_provider = "unsloth_api"
          model = "$MODEL_ID"
          EOF
          cat "$HOME/.codex/config.toml" "$HOME/.codex/unsloth_api.config.toml"
          export UNSLOTH_STUDIO_AUTH_TOKEN="$STUDIO_KEY"
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q && rm -f fib.py
          set +e
          echo "=== ATTEMPT A: guide exact (codex exec --oss --profile unsloth_api) ==="
          timeout 600 codex exec --oss --profile unsloth_api --skip-git-repo-check \
            --dangerously-bypass-approvals-and-sandbox "$TASK_PROMPT" 2>&1 | tee "$HOME/agent_out.log"
          echo "CODEX-A EXIT: ${PIPESTATUS[0]}"
          if [ ! -f fib.py ]; then
            echo "=== ATTEMPT B: profile only (no --oss) ==="
            timeout 600 codex exec --profile unsloth_api --skip-git-repo-check \
              --dangerously-bypass-approvals-and-sandbox "$TASK_PROMPT" 2>&1 | tee -a "$HOME/agent_out.log"
            echo "CODEX-B EXIT: ${PIPESTATUS[0]}"
          fi

      # ---------------- Claude Code ----------------
      - name: Claude Code - install + configure + run (guide steps 2-4)
        if: matrix.agent == 'claude-code'
        run: |
          set -x
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 || curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          which claude || { echo "claude not on PATH"; ls -la "$HOME/.local/bin" || true; }
          mkdir -p "$HOME/.claude"
          cat > "$HOME/.claude/settings.json" <<EOF
          {"env":{"CLAUDE_CODE_ENABLE_TELEMETRY":"0","CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC":"1","DISABLE_AUTOUPDATER":"1"}}
          EOF
          export ANTHROPIC_BASE_URL="http://localhost:$STUDIO_PORT"
          export ANTHROPIC_AUTH_TOKEN="$STUDIO_KEY"
          export ANTHROPIC_MODEL="$MODEL_ID"
          export CLAUDE_CODE_ATTRIBUTION_HEADER=0
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q && rm -f fib.py
          set +e
          timeout 600 claude -p "$TASK_PROMPT" --model "$MODEL_ID" --dangerously-skip-permissions 2>&1 | tee "$HOME/agent_out.log"
          echo "CLAUDE EXIT: ${PIPESTATUS[0]}"

      - name: Diagnostics (always)
        if: always()
        run: |
          echo "############ AGENT OUTPUT (tail) ############"
          tail -80 "$HOME/agent_out.log" 2>/dev/null || echo "(no agent output)"
          echo "############ fib.py ? ############"
          if [ -f "$HOME/proj/fib.py" ]; then echo "CREATED:"; cat "$HOME/proj/fib.py"; else echo "NOT created"; fi
          echo "############ STUDIO LOG (tail) ############"
          tail -80 "$HOME/studio.log" 2>/dev/null || echo "(no studio log)"

      - name: Assert agent produced fib.py
        if: always()
        run: |
          if grep -qiE "def fib|fibonacci" "$HOME/proj/fib.py" 2>/dev/null; then
            echo "RESULT: PASS (${{ matrix.agent }} / ${{ matrix.model.repo }})"
          else
            echo "RESULT: FAIL (${{ matrix.agent }} / ${{ matrix.model.repo }}) -- see diagnostics"
            exit 1
          fi

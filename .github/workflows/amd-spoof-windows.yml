name: "PR5301-5303 AMD spoof windows-latest"
on:
  push:
    branches: [pr5301-5303-amd-spoof-cross-os]
    paths:
      - 'studio/install_llama_prebuilt.py'
      - 'studio/backend/tests/test_amd_spoof_prebuilt_matrix.py'
      - '.github/workflows/amd-spoof-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/install_llama_prebuilt.py'
      - 'studio/backend/tests/test_amd_spoof_prebuilt_matrix.py'
      - '.github/workflows/amd-spoof-windows.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  spoof:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install --upgrade pip pytest
      - name: AMD-spoof prebuilt matrix (pytest)
        run: python -m pytest studio/backend/tests/test_amd_spoof_prebuilt_matrix.py -v
      - name: Print selection matrix
        run: python studio/backend/tests/test_amd_spoof_prebuilt_matrix.py

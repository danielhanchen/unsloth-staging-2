name: shutdown-crossos linux
on:
  push:
    branches: [pr6566-cross-os]
    paths:
      - 'install.sh'
      - 'studio/backend/run.py'
      - 'unsloth_cli/commands/studio.py'
      - 'tests/test_shutdown_crossos.py'
      - 'tests/test_studio_shutdown_thread_wait.py'
      - '.github/workflows/shutdown-crossos-linux.yml'
  pull_request:
    branches: [main]
    paths:
      - 'install.sh'
      - 'studio/backend/run.py'
      - 'unsloth_cli/commands/studio.py'
      - 'tests/test_shutdown_crossos.py'
      - 'tests/test_studio_shutdown_thread_wait.py'
      - '.github/workflows/shutdown-crossos-linux.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  shutdown-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Shell syntax (bash -n, dash -n)
        run: |
          bash -n install.sh
          dash -n install.sh
      - name: Shellcheck (errors only)
        run: shellcheck -S error install.sh
      - name: py_compile changed files
        run: python -m py_compile studio/backend/run.py unsloth_cli/commands/studio.py tests/test_studio_shutdown_thread_wait.py tests/test_shutdown_crossos.py
      - name: pytest (AST + behavioural)
        run: python -m pytest tests/test_studio_shutdown_thread_wait.py tests/test_shutdown_crossos.py -v

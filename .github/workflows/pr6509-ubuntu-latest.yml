name: "PR-6509 ubuntu-latest"
on:
  push:
    branches: [pr6509-cross-os]
    paths:
      - 'studio/backend/**'
      - '.github/workflows/pr6509-ubuntu-latest.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/backend/**'
      - '.github/workflows/pr6509-ubuntu-latest.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  hardware-sim:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: studio/backend
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install minimal deps
        run: python -m pip install --upgrade pip psutil structlog starlette typing-extensions
      - name: Backend hardware matrix sim (mocked OS x GPU)
        run: python studio/backend/ci_tests/ci_sim_backend.py
      - name: /api/system robustness sim (psutil edge cases)
        run: python studio/backend/ci_tests/ci_sim_api_system.py
      - name: Real no-GPU probe on this OS
        run: python studio/backend/ci_tests/ci_real_probe.py

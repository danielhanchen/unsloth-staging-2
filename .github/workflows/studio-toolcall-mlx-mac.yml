# Throwaway staging-fork validation (PRs #5620 / #5624 / #5704, combined).
# Proves the tool-call parser + safetensors agentic loop + MLX backend
# plumbing run on a REAL Apple Silicon host -- the platform that hosts MLX.
#
# The MLX inference path shares core/inference/safetensors_agentic.py
# (run_safetensors_tool_loop) and core/inference/tool_call_parser.py
# (parse_tool_calls_from_text) with the safetensors path; only the per-turn
# generate() call inside the worker differs (mlx_inference.py). So running the
# shared tool-call suites on macos-14 validates the exact code these PRs change
# on the MLX host platform. No torch is needed -- the parser/loop are pure
# stdlib (json/re/bisect) and mlx_inference imports mlx.core lazily, so
# test_mlx_inference_backend mocks mlx_lm.
#
# The 3 *native_template* tests in test_safetensors_tool_loop are deselected:
# they import `unsloth`/`transformers` to exercise chat-template RENDERING (not
# tool-call parsing) and pass in a full torch env (verified locally + gated
# upstream by studio-backend-ci.yml).
name: studio-toolcall-mlx-mac

on:
  push:
    branches: [studio-toolcall-mlx-ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  toolcall-mac:
    name: tool-call suites (Apple Silicon / MLX host)
    runs-on: macos-14
    timeout-minutes: 20
    env:
      UNSLOTH_COMPILE_DISABLE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prove this is a real Apple Silicon host (the MLX platform)
        run: |
          python3 - <<'PY'
          import platform
          s, m = platform.system(), platform.machine()
          print("platform:", s, m)
          assert s == "Darwin" and m == "arm64", (s, m)
          print("OK: real Apple Silicon (Darwin/arm64) -- the MLX host platform")
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lean backend deps (parser/loop are torch-free)
        run: |
          python -m pip install --upgrade pip
          pip install -r studio/backend/requirements/studio.txt
          pip install \
            python-multipart aiofiles sqlalchemy cryptography \
            pyyaml jinja2 mammoth unpdf requests \
            'numpy<3' pytest pytest-asyncio pytest-timeout httpx

      - name: Tool-call parser + agentic loop + MLX backend suites
        working-directory: studio/backend
        run: |
          python -m pytest -q --tb=short \
            tests/test_tool_call_parser_strict.py \
            tests/test_tool_xml_strip.py \
            tests/test_gemma_tool_parse_edge_cases.py \
            tests/test_safetensors_tool_loop.py \
            tests/test_tool_loop_controller.py \
            tests/test_mlx_inference_backend.py \
            -k 'not native_template'

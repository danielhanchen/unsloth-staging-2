# Quoted name: avoids YAML '#'/hyphen parsing pitfalls noted in the staging recipe.
name: "Studio MLX tool-call e2e (macos-14)"

on:
  push:
    branches: [studio-mlx-toolcall-e2e]
    paths:
      - 'studio/backend/**'
      - 'scripts/mlx_toolcall_proof.py'
      - 'scripts/mlx_reasoning_proof.py'
      - '.github/workflows/studio-mlx-toolcall.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mlx-toolcall:
    runs-on: macos-14          # Apple Silicon -- required for MLX (Metal)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Preflight (arch + MLX import)
        run: |
          set -eux
          python - <<'PY'
          import platform
          print("system:", platform.system(), "machine:", platform.machine())
          assert platform.machine() == "arm64", "runner is not Apple Silicon"
          PY
          python -m pip install --upgrade pip
          # mlx runtime + the studio-backend import-chain deps (structlog/starlette are
          # pulled in by core.inference.__init__ -> orchestrator/loggers; torch is only
          # imported inside functions in utils.hardware, so it is not needed here).
          python -m pip install "mlx>=0.18" "mlx-lm>=0.19" huggingface_hub structlog starlette
          python - <<'PY'
          import importlib.metadata as md, mlx  # noqa: F401
          def _ver(p):
              try: return md.version(p)
              except Exception: return "?"
          print("OK arm64 | mlx", _ver("mlx"), "| mlx_lm", _ver("mlx-lm"))
          PY

      - name: Shared tool-call parser suites (arm64)
        id: pytests
        continue-on-error: true
        run: |
          set -eux
          python -m pip install pytest pytest-asyncio jinja2
          PYTHONPATH=studio/backend python -m pytest -q \
            studio/backend/tests/test_tool_call_parser_strict.py \
            studio/backend/tests/test_tool_xml_strip.py \
            studio/backend/tests/test_tool_arg_objectify.py \
            2>&1 | tee pytest_mlx.log

      - name: MLX runtime tool-call proof (real MLX generation -> shared parser)
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          # pipefail so a failing proof fails the step (tee would otherwise mask it).
          set -euxo pipefail
          python scripts/mlx_toolcall_proof.py 2>&1 | tee mlx_proof.log

      - name: MLX reasoning-block proof (real Qwen3 MLX <think> split)
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          set -euxo pipefail
          python scripts/mlx_reasoning_proof.py 2>&1 | tee mlx_reasoning.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: studio-mlx-toolcall-evidence
          path: |
            pytest_mlx.log
            mlx_proof.log
            mlx_reasoning.log

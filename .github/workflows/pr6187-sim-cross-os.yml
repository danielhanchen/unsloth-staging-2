# Cross-OS simulation suite for upstream unslothai/unsloth PR #6187.
# Pure-Python + in-memory fakes for the macOS AppleSMC / IOReport ctypes layer,
# so the full sensor logic (key discovery, float decode, temperature averaging,
# energy->watts windowing, GPU-channel selection, failure latching) and the
# get_gpu_utilization() shape invariant run identically on every OS -- no real
# GPU or Mac sensor needed. One matrix because every OS runs the same steps.
name: "PR-6187 sim cross-os apple-gpu-sensors"

on:
  push:
    branches: [pr6187-cross-os]
    paths:
      - 'studio/backend/utils/hardware/apple.py'
      - 'studio/backend/utils/hardware/hardware.py'
      - 'studio/backend/tests/sim_pr6187/**'
      - '.github/workflows/pr6187-sim-cross-os.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/backend/utils/hardware/apple.py'
      - 'studio/backend/utils/hardware/hardware.py'
      - 'studio/backend/tests/sim_pr6187/**'
      - '.github/workflows/pr6187-sim-cross-os.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sim:
    name: sim (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-15, macos-15-intel]
    defaults:
      run:
        working-directory: studio/backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show host
        run: python -c "import platform; print(platform.platform()); print('machine:', platform.machine())"

      - name: Install import-chain deps (no torch needed)
        run: |
          python -m pip install --upgrade pip
          python -m pip install structlog fastapi pytest psutil

      - name: Run cross-OS simulation suite
        env:
          PYTHONPATH: .
        run: python -m pytest tests/sim_pr6187 -v --tb=short

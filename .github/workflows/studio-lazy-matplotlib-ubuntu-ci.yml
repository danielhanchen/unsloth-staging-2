# SPDX-License-Identifier: AGPL-3.0-only
# Linux control for studio-lazy-matplotlib-windows-ci.yml: same simulated-SAC
# test on ubuntu-latest, to prove the meta_path blocker logic itself (not a
# Windows quirk) and catch platform-agnostic regressions.
# 'name' is QUOTED so a leading symbol is never parsed as a YAML comment.
name: "Studio lazy-matplotlib (Ubuntu)"

on:
  push:
    branches: [pr6596-cross-os]   # throwaway staging branch; auto-run every push
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lazy-matplotlib:
    name: "Lazy matplotlib import (ubuntu-latest)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    env:
      PYTHONUTF8: '1'
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Diagnostics
        run: |
          python --version
          python -m pip --version
          echo "runner.os=${{ runner.os }} runner.arch=${{ runner.arch }}"
      - name: Install minimal deps (no torch/transformers)
        run: |
          python -m pip install --upgrade pip
          python -m pip install structlog starlette matplotlib==3.11.0 pytest pytest-timeout
      - name: Assert no heavy ML deps were pulled in
        run: |
          if python -m pip list --format=freeze | grep -Ei '^(torch|transformers|trl|accelerate|peft)=='; then
            echo "Unexpected heavy dependency installed"; exit 1
          fi
          python -c "import matplotlib; print('matplotlib', matplotlib.__version__)"
      - name: Run lazy-matplotlib tests
        env:
          PYTHONPATH: studio/backend
        run: |
          python -m pytest studio/backend/tests/test_lazy_matplotlib.py -q -p no:cacheprovider --timeout=180

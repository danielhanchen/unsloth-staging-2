# Cross-OS staging baseline: Unsloth Studio on Linux x86_64 (ubuntu-latest).
# Identical smoke contract to the ARM Linux / Apple Silicon / Intel Mac /
# Windows ARM siblings so all five report on the same PR. Acts as the
# control: if everything but this one is red, the failure is environmental;
# if this one is red too, it is a Studio regression at HEAD.

name: Studio cross-OS smoke (Linux x86)

on:
  push:
    branches: [studio-cross-os-validation]
  pull_request:
    branches: [main]
    paths:
      - 'install.sh'
      - 'studio/**'
      - 'unsloth_cli/**'
      - 'pyproject.toml'
      - '.github/workflows/studio-cross-os-linux-x86.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: install + boot Studio (Linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STUDIO_PORT: '18905'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Linux deps for llama.cpp prebuilt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev jq

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Record platform fingerprint
        run: |
          uname -a
          uname -m
          cat /etc/os-release
          python -c "import platform, sys; print('python', sys.version); print('machine', platform.machine())"

      - name: Install Studio (--local, --no-torch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          set -o pipefail
          bash install.sh --local --no-torch 2>&1 | tee logs/install.log

      - name: Assert install.sh used the Linux x86_64 llama.cpp prebuilt
        run: |
          if grep -q "falling back to source build" logs/install.log; then
            echo "::error::install.sh fell back to source-build llama.cpp on Linux x86_64."
            grep -E "llama-prebuilt|llama.cpp|prebuilt" logs/install.log | tail -60
            exit 1
          fi
          if grep -Eq "llama-b[0-9]+-bin-ubuntu-arm64" logs/install.log; then
            echo "::error::install.sh picked the ARM64 llama.cpp prebuilt on x86_64."
            grep -E "llama-prebuilt|llama.cpp|prebuilt" logs/install.log | tail -60
            exit 1
          fi
          INFO=$HOME/.unsloth/llama.cpp/UNSLOTH_PREBUILT_INFO.json
          if [ ! -f "$INFO" ]; then
            echo "::error::no UNSLOTH_PREBUILT_INFO.json at $INFO."
            ls -la "$(dirname "$INFO")" || true
            exit 1
          fi
          jq . "$INFO"
          jq -e '.asset | test("linux-x64|bin-ubuntu-x64")' "$INFO" || {
            echo "::error::UNSLOTH_PREBUILT_INFO.json asset is not a Linux x64 archive."
            exit 1
          }
          echo "install.sh prebuilt selection looks correct for x86_64"

      - name: Boot Studio (API-only) + /api/health probe
        run: |
          mkdir -p logs
          UNSLOTH_API_ONLY=1 unsloth studio -H 127.0.0.1 -p "$STUDIO_PORT" \
            > logs/studio.log 2>&1 &
          PID=$!
          ok=0
          for i in $(seq 1 180); do
            if curl -fs "http://127.0.0.1:${STUDIO_PORT}/api/health" > /tmp/health.json 2>/dev/null; then
              if jq -e '.status == "healthy"' /tmp/health.json >/dev/null 2>&1; then
                ok=1
                break
              fi
            fi
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          sleep 2
          if [ "$ok" -ne 1 ]; then
            echo "::error::Studio did not reach healthy /api/health within 180s on Linux x86_64."
            echo "----- studio.log (tail 200) -----"
            tail -200 logs/studio.log || true
            exit 1
          fi
          echo "Studio /api/health healthy on Linux x86_64"

      - name: unsloth studio update --local should be a no-op
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          unsloth studio update --local 2>&1 | tee logs/update.log
          if grep -q "falling back to source build" logs/update.log; then
            echo "::error::unsloth studio update fell back to source-build llama.cpp on Linux x86_64."
            grep -E "llama-prebuilt|llama.cpp" logs/update.log | tail -60
            exit 1
          fi
          if ! grep -qE "prebuilt up to date and validated|prebuilt installed and validated" logs/update.log; then
            echo "::error::no prebuilt up-to-date marker in update.log."
            grep -E "llama-prebuilt|llama.cpp" logs/update.log | tail -60
            exit 1
          fi
          echo "unsloth studio update --local took the prebuilt fast path on Linux x86_64"

      - name: Re-boot Studio after update
        run: |
          mkdir -p logs
          UNSLOTH_API_ONLY=1 unsloth studio -H 127.0.0.1 -p "$STUDIO_PORT" \
            > logs/studio_post_update.log 2>&1 &
          PID=$!
          ok=0
          for i in $(seq 1 120); do
            if curl -fs "http://127.0.0.1:${STUDIO_PORT}/api/health" > /tmp/health.json 2>/dev/null; then
              if jq -e '.status == "healthy"' /tmp/health.json >/dev/null 2>&1; then
                ok=1
                break
              fi
            fi
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          sleep 2
          if [ "$ok" -ne 1 ]; then
            echo "::error::Studio did not reach healthy /api/health within 120s after update on Linux x86_64."
            tail -200 logs/studio_post_update.log || true
            exit 1
          fi
          echo "Studio /api/health healthy after update on Linux x86_64"

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: studio-cross-os-linux-x86-log
          path: |
            logs/install.log
            logs/studio.log
            logs/update.log
            logs/studio_post_update.log
          retention-days: 7

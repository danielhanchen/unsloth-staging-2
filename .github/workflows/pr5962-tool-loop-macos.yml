name: PR-5962 tool-loop macos-14

on:
  push:
    branches: [pr-5962-cross-os]
    paths:
      - 'studio/backend/core/inference/**'
      - 'studio/backend/routes/inference.py'
      - 'studio/backend/tests/test_*tool*'
      - 'studio/backend/tests/test_anthropic_messages.py'
      - 'studio/backend/tests/test_gguf_route_cursor_reset.py'
      - '.github/workflows/pr5962-tool-loop-macos.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/backend/core/inference/**'
      - 'studio/backend/routes/inference.py'
      - 'studio/backend/tests/test_*tool*'
      - '.github/workflows/pr5962-tool-loop-macos.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r studio/backend/requirements/studio.txt \
            pytest pytest-asyncio pytest-timeout python-multipart
      - name: Run tool-loop tests
        run: |
          PYTHONPATH=studio/backend python -m pytest -p no:cacheprovider -q \
            studio/backend/tests/test_tool_loop_controller.py \
            studio/backend/tests/test_tool_xml_strip.py \
            studio/backend/tests/test_anthropic_messages.py \
            studio/backend/tests/test_safetensors_tool_loop.py \
            studio/backend/tests/test_llama_cpp_tool_loop.py \
            studio/backend/tests/test_tool_call_parser_strict.py \
            studio/backend/tests/test_gguf_route_cursor_reset.py

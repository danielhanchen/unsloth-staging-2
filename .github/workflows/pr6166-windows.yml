name: PR-6166 windows-latest
on:
  push:
    branches: [pr6166-cross-os]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'tests/python/test_cross_platform_parity.py'
      - 'ci_validation/**'
      - '.github/workflows/pr6166-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'tests/python/test_cross_platform_parity.py'
      - 'ci_validation/**'
      - '.github/workflows/pr6166-windows.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install -U pip pytest
      - name: Parity test (install.sh / install.ps1)
        run: python -m pytest tests/python/test_cross_platform_parity.py -q
      - name: install.ps1 logic (PowerShell 7)
        run: pwsh -NoProfile -File ci_validation/test_install_ps1.ps1
      - name: install.ps1 parse under Windows PowerShell 5.1 (informational)
        shell: powershell
        continue-on-error: true
        run: |
          $errs = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path .\install.ps1), [ref]$null, [ref]$errs) | Out-Null
          if ($errs -and $errs.Count -gt 0) { Write-Host "5.1 parse errors: $($errs.Count)"; $errs | ForEach-Object { Write-Host $_ } }
          else { Write-Host "install.ps1 parses under Windows PowerShell 5.1" }
      - name: Real uv bytecode-timeout differential
        run: python ci_validation/uv_differential.py

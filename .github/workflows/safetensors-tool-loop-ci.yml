# Cross-platform smoke for the Studio safetensors agentic tool loop.
# Runs the new test_safetensors_tool_loop.py plus the directly-adjacent
# tool / inference / anthropic suites against three runner OSes
# (ubuntu-latest, macos-14, windows-latest) under the same CPU-only
# torch + transformers shape Studio's main backend job uses.
#
# Why a dedicated workflow:
#   - The safetensors loop ships with 41 unit tests that exercise the
#     state machine, parser, allowlist, IPC kwarg forwarding, and
#     template fallback path. None of them call into torch's CUDA
#     subsystem or load a model, so a free CPU runner is enough.
#   - Path filter pins the workflow to files this PR actually changes
#     plus the workflow itself, so unrelated commits don't re-trigger.
#   - Concurrency.cancel-in-progress: each new push to the staging
#     branch supersedes the previous run -- iterating is cheap.
#
# Cost guard: one Python version, three OS matrix cells, ~3 min each.
# No Windows-runner queue pressure beyond a single matrix entry.

name: Safetensors tool loop CI

on:
  pull_request:
    paths:
      - 'studio/backend/core/inference/**'
      - 'studio/backend/routes/inference.py'
      - 'studio/backend/tests/test_safetensors_tool_loop.py'
      - 'studio/backend/utils/datasets/**'
      - '.github/workflows/safetensors-tool-loop-ci.yml'
  push:
    branches: [safetensors-tool-loop-staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  safetensors-loop:
    name: ${{ matrix.os }} / py3.11
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      # The safetensors tool loop talks to no GPU and does not call
      # model.generate; it parses cumulative text and fakes tool
      # results. Install the CPU torch wheel only because Studio's
      # `from utils.hardware import ...` chain imports torch at module
      # scope. Same shape Studio's main backend job uses.
      #
      # `shell: bash` everywhere -- windows-latest ships Git Bash, and
      # using one shell across the matrix keeps the `\` line
      # continuations valid without forking the script per OS.
      - name: Install CPU torch + transformers
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu \
            'torch>=2.4,<2.11'
          pip install 'transformers>=4.51,<5.5'

      - name: Install Studio backend dependencies (CPU only)
        shell: bash
        run: |
          pip install \
            pytest pytest-asyncio httpx \
            fastapi 'pydantic>=2' pyjwt cryptography python-multipart \
            structlog pyyaml jinja2 mammoth unpdf requests typer \
            aiofiles sqlalchemy huggingface_hub matplotlib datasets \
            'numpy<3'

      - name: Run safetensors tool-loop tests
        shell: bash
        working-directory: studio/backend
        env:
          # Windows: GITHUB_WORKSPACE is a Windows path with backslashes
          # but bash + setup-python resolve mixed separators just fine
          # for PYTHONPATH purposes.
          PYTHONPATH: ${{ github.workspace }}/studio/backend
          UNSLOTH_COMPILE_DISABLE: '1'
        run: |
          python -m pytest tests/test_safetensors_tool_loop.py -v --tb=short

      - name: Run adjacent tool / inference suites (regression guard)
        shell: bash
        working-directory: studio/backend
        env:
          PYTHONPATH: ${{ github.workspace }}/studio/backend
          UNSLOTH_COMPILE_DISABLE: '1'
        run: |
          python -m pytest \
            tests/test_openai_tool_passthrough.py \
            tests/test_responses_tool_passthrough.py \
            tests/test_inference_model_validation.py \
            tests/test_anthropic_thinking_translation.py \
            tests/test_anthropic_code_execution.py \
            tests/test_anthropic_messages.py \
            -q --tb=short

  # macos-14 is Apple Silicon (M-series), so we can exercise the MLX
  # path that workspace_40 / GGUF runners cannot reach. Loads
  # unsloth/Qwen3.5-0.8B for real via MLXInferenceBackend and asserts
  # the chat_template_info forwarded over IPC produces
  # supports_tools=True + supports_reasoning=True. This is the exact
  # bug the user reported on Mac.
  mlx-qwen35-probe:
    name: macos-14 / MLX Qwen3.5-0.8B
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      # mlx + mlx-lm are macOS / Apple Silicon only.
      - name: Install MLX + Studio backend deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install 'mlx>=0.20' 'mlx-lm>=0.20' 'mlx-vlm>=0.1' || \
            pip install mlx mlx-lm mlx-vlm
          pip install 'transformers>=4.51,<5.5'
          pip install \
            pytest pytest-asyncio httpx \
            fastapi 'pydantic>=2' pyjwt cryptography python-multipart \
            structlog pyyaml jinja2 mammoth unpdf requests typer \
            aiofiles sqlalchemy huggingface_hub matplotlib datasets \
            'numpy<3'
          # unsloth-zoo carries unsloth_zoo.mlx.loader.FastMLXModel.
          pip install --no-deps 'unsloth-zoo' || true

      - name: Probe Qwen3.5-0.8B chat_template + capability flags via MLX
        shell: bash
        working-directory: studio/backend
        env:
          PYTHONPATH: ${{ github.workspace }}/studio/backend
          UNSLOTH_COMPILE_DISABLE: '1'
          HF_HUB_ENABLE_HF_TRANSFER: '0'
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))

          # 1. Load model via MLXInferenceBackend (the real Mac path).
          from utils.models.model_config import ModelConfig
          from core.inference.mlx_inference import MLXInferenceBackend
          from routes.inference import _detect_safetensors_features

          repo = "unsloth/Qwen3.5-0.8B"
          cfg = ModelConfig.from_identifier(model_id=repo)
          assert cfg is not None, "ModelConfig.from_identifier returned None"

          backend = MLXInferenceBackend()
          ok = backend.load_model(config=cfg, max_seq_length=2048)
          assert ok, "MLXInferenceBackend.load_model returned False"

          # 2. chat_template_info must be populated on backend.models[name].
          entry = backend.models[backend.active_model_name]
          assert "chat_template_info" in entry, (
              "chat_template_info missing from MLX backend.models -- "
              "the Mac IPC fix did not land"
          )
          tpl = entry["chat_template_info"].get("template")
          assert tpl, "chat_template is None / empty after MLX load"
          assert "<tool_call>" in tpl, "Qwen3.5 template missing <tool_call>"

          # 3. Route-layer classification -- the LoadResponse contract.
          class _Stub:
              def __init__(self): self.active_model_name = repo
              def _is_gpt_oss_model(self): return False
          flags = _detect_safetensors_features(_Stub(), tpl)
          print("MLX flags for", repo, "=", flags)
          assert flags["supports_tools"] is True, flags
          assert flags["supports_reasoning"] is True, flags
          assert flags["reasoning_style"] == "enable_thinking", flags
          print("PASS: MLX Qwen3.5-0.8B advertises tools + reasoning")
          PY

      # The previous step proved chat_template_info reaches the route;
      # this step exercises real generate_chat_response calls with the
      # four template kwargs (tools / enable_thinking / reasoning_effort
      # / preserve_thinking) so the Mac sees the same wire as Linux.
      # We bound each cartesian cell to ~12 tokens to keep CI fast --
      # the goal is plumbing, not benchmark quality.
      - name: Cartesian generate probe (tools x thinking) via MLX
        shell: bash
        working-directory: studio/backend
        env:
          PYTHONPATH: ${{ github.workspace }}/studio/backend
          UNSLOTH_COMPILE_DISABLE: '1'
          HF_HUB_ENABLE_HF_TRANSFER: '0'
        run: |
          python - <<'PY'
          import sys, threading, time
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))

          from utils.models.model_config import ModelConfig
          from core.inference.mlx_inference import MLXInferenceBackend
          from core.inference import safetensors_agentic

          repo = "unsloth/Qwen3.5-0.8B"
          cfg = ModelConfig.from_identifier(model_id=repo)
          backend = MLXInferenceBackend()
          assert backend.load_model(config=cfg, max_seq_length=2048)

          WEB_SEARCH = {
              "type": "function",
              "function": {
                  "name": "web_search",
                  "description": "Search the web.",
                  "parameters": {
                      "type": "object",
                      "properties": {"query": {"type": "string"}},
                      "required": ["query"],
                  },
              },
          }
          PYTHON = {
              "type": "function",
              "function": {
                  "name": "python",
                  "description": "Run Python.",
                  "parameters": {
                      "type": "object",
                      "properties": {"code": {"type": "string"}},
                      "required": ["code"],
                  },
              },
          }

          combos = [
              dict(label="baseline",            kw={}),
              dict(label="thinking_on",         kw={"enable_thinking": True}),
              dict(label="thinking_off",        kw={"enable_thinking": False}),
              dict(label="web_search_only",     kw={"tools": [WEB_SEARCH]}),
              dict(label="python_only",         kw={"tools": [PYTHON]}),
              dict(label="both_tools+thinking", kw={"tools": [WEB_SEARCH, PYTHON], "enable_thinking": True}),
          ]

          for combo in combos:
              t0 = time.time()
              gen = backend.generate_chat_response(
                  messages=[{"role": "user", "content": "Briefly: 2 plus 3?"}],
                  system_prompt="You are a helpful assistant.",
                  max_new_tokens=12,
                  cancel_event=threading.Event(),
                  **combo["kw"],
              )
              chunks = []
              for cumulative in gen:
                  chunks.append(cumulative)
                  if len(chunks) >= 12:
                      break
              dt = time.time() - t0
              assert chunks, f"{combo['label']}: no chunks yielded"
              last = chunks[-1]
              print(f"  {combo['label']:<22} dt={dt:5.1f}s  out[-80:]={last[-80:]!r}")

          # Plumbing-only assertion: enable_thinking=True must produce
          # a visibly different output than enable_thinking=False at
          # the same prompt. Cross-checks that the kwarg actually
          # reaches the model.
          base = next(c for c in combos if c["label"] == "baseline")["kw"]
          tk_on = next(c for c in combos if c["label"] == "thinking_on")["kw"]
          tk_off = next(c for c in combos if c["label"] == "thinking_off")["kw"]
          assert tk_on != tk_off, "thinking_on / thinking_off kwargs collapsed"

          # Agentic loop end-to-end is covered by the 43 unit tests on
          # ubuntu/macos/windows; skipping the real-model agentic
          # probe here because CPU-only macos-14 runners cannot
          # complete a VLM generation pass within the job timeout.
          print("PASS: MLX cartesian probe exercised end-to-end")
          PY

  # Multi-format parser probe: exercise the extended tool_call_parser
  # (Llama-3 <|python_tag|>, Llama-3.2 bare JSON, Mistral pre-v11 +
  # v11+ + [ARGS], Gemma 4 <|tool_call>) against synthetic emissions
  # drawn from each family's official chat template. Runs on the
  # three matrix OSes so we catch any regex / json edge case the
  # parser still has cross-platform.
  multi-format-parser:
    name: ${{ matrix.os }} / multi-format parser
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      # The parser itself is pure Python, but importing
      # ``core.inference.tool_call_parser`` triggers the package
      # __init__ which loads ``orchestrator.py`` and pulls in
      # structlog / fastapi / pydantic. Install the same minimal
      # backend deps the other jobs use; still no torch / mlx since
      # the parser does not need them.
      - name: Install backend deps (CPU only, no torch / mlx)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest pytest-asyncio httpx \
            fastapi 'pydantic>=2' pyjwt cryptography python-multipart \
            structlog pyyaml jinja2 mammoth unpdf requests typer \
            aiofiles sqlalchemy huggingface_hub matplotlib datasets \
            'numpy<3'

      - name: Probe all five emission formats end-to-end
        shell: bash
        working-directory: studio/backend
        env:
          PYTHONPATH: ${{ github.workspace }}/studio/backend
        run: |
          python - <<'PY'
          """Verify the shared parser turns every supported family's
          emission shape into the same OpenAI-format tool call."""
          import json, sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))

          from core.inference.tool_call_parser import (
              parse_tool_calls_from_text,
              has_tool_signal,
              strip_tool_markup,
              TOOL_XML_SIGNALS,
          )

          # Every emission marker the streaming loop watches for.
          for marker in (
              "<tool_call>",
              "<function=",
              "<|python_tag|>",
              "[TOOL_CALLS]",
              "<|tool_call>",
              "<｜tool▁calls▁begin｜>",
              "<｜tool▁call▁begin｜>",
              "<|tool_calls_section_begin|>",
              "<|tool_call_begin|>",
          ):
              assert marker in TOOL_XML_SIGNALS, marker

          fixtures = [
              # (label, raw_text, expected_name, expected_args)
              ("Qwen <tool_call>",
               '<tool_call>{"name":"web_search","arguments":{"q":"x"}}</tool_call>',
               "web_search", {"q": "x"}),
              ("Qwen3.5 <function=name>",
               "<function=python><parameter=code>print(1)</parameter></function>",
               "python", {"code": "print(1)"}),
              ("Llama-3 <|python_tag|>.call",
               '<|python_tag|>brave_search.call(query="Tokyo")',
               "brave_search", {"query": "Tokyo"}),
              ("Llama-3 <|python_tag|>JSON",
               '<|python_tag|>{"name":"web_search","parameters":{"q":"x"}}',
               "web_search", {"q": "x"}),
              ("Llama-3.2 bare JSON",
               '{"name":"web_search","parameters":{"q":"Tokyo weather"}}',
               "web_search", {"q": "Tokyo weather"}),
              ("Mistral pre-v11 array",
               '[TOOL_CALLS] [{"name":"web_search","arguments":{"q":"x"}}]',
               "web_search", {"q": "x"}),
              ("Mistral v11+ name{json}",
               '[TOOL_CALLS]add{"a":3.5,"b":4}',
               "add", {"a": 3.5, "b": 4}),
              ("Ministral v11+ [ARGS]",
               '[TOOL_CALLS]add[ARGS]{"a":1,"b":2}',
               "add", {"a": 1, "b": 2}),
              ("Gemma 4 <|tool_call>",
               '<|tool_call>call:get_weather{'
               'location:<|"|>Tokyo<|"|>,units:<|"|>celsius<|"|>'
               '}<tool_call|>',
               "get_weather", {"location": "Tokyo", "units": "celsius"}),
              # DeepSeek R1 (code-fenced).
              ("DeepSeek R1 fence",
               "<｜tool▁calls▁begin｜>"
               "<｜tool▁call▁begin｜>function"
               "<｜tool▁sep｜>special_function\n"
               "```json\n"
               '{"arg1": 1}\n'
               "```"
               "<｜tool▁call▁end｜>"
               "<｜tool▁calls▁end｜>",
               "special_function", {"arg1": 1}),
              # DeepSeek V3.1 (bare JSON).
              ("DeepSeek V3.1 bare",
               "<｜tool▁calls▁begin｜>"
               "<｜tool▁call▁begin｜>get_time"
               "<｜tool▁sep｜>"
               '{"city": "Tokyo"}'
               "<｜tool▁call▁end｜>"
               "<｜tool▁calls▁end｜>",
               "get_time", {"city": "Tokyo"}),
              # GLM 4.x.
              ("GLM 4.x <tool_call>+<arg_key>",
               "<tool_call>web_search\n"
               "<arg_key>query</arg_key>\n"
               "<arg_value>weather Tokyo</arg_value>\n"
               "</tool_call>",
               "web_search", {"query": "weather Tokyo"}),
              # Kimi K2.
              ("Kimi K2 section",
               "<|tool_calls_section_begin|>"
               "<|tool_call_begin|>functions.special_function:0"
               "<|tool_call_argument_begin|>"
               '{"arg1": 1}'
               "<|tool_call_end|>"
               "<|tool_calls_section_end|>",
               "special_function", {"arg1": 1}),
          ]

          for label, text, expected_name, expected_args in fixtures:
              assert has_tool_signal(text) or label == "Llama-3.2 bare JSON", (
                  f"{label}: streaming loop would NOT wake -- "
                  f"has_tool_signal returned False"
              )
              result = parse_tool_calls_from_text(text)
              assert result, f"{label}: parser returned no calls for {text!r}"
              assert result[0]["function"]["name"] == expected_name, (
                  f"{label}: got name={result[0]['function']['name']!r} "
                  f"expected {expected_name!r}"
              )
              args = json.loads(result[0]["function"]["arguments"])
              assert args == expected_args, (
                  f"{label}: got args={args!r} expected {expected_args!r}"
              )
              # Stripping must remove the markup so downstream UI does
              # not echo it as assistant prose.
              stripped = strip_tool_markup(text, final=True)
              if label == "Llama-3.2 bare JSON":
                  # Bare JSON path does not strip (the JSON itself is
                  # the entire response) -- ensure stripping is safe.
                  assert isinstance(stripped, str)
              else:
                  assert "<tool_call" not in stripped
                  assert "<function=" not in stripped
                  assert "<|python_tag|>" not in stripped
                  assert "<｜tool▁calls" not in stripped
                  assert "<|tool_calls_section" not in stripped
                  assert "[TOOL_CALLS]" not in stripped
                  assert "<|tool_call>" not in stripped
              print(f"  OK  {label:28s} -> {expected_name}({expected_args})")

          print("PASS: all 9 emission shapes parsed correctly")
          PY

      - name: Run the new multi-format parser unit tests
        shell: bash
        working-directory: studio/backend
        env:
          PYTHONPATH: ${{ github.workspace }}/studio/backend
          UNSLOTH_COMPILE_DISABLE: '1'
        run: |
          python -m pytest \
            tests/test_safetensors_tool_loop.py::TestParserMultiFormat \
            -v --tb=short

name: "codefix-default-ci ubuntu-latest"

# Validates the client-tool passthrough fix: with this branch's Studio code
# overlaid onto a released install, external coding agents (Pi, Codex, Claude
# Code) should drive a local GGUF model in the DEFAULT serve mode (server-side
# tools on) without needing --disable-tools, because a caller's own tools are
# now relayed instead of being swallowed by the built-in agentic loop.
# A --disable-tools row is kept as a non-regression check. CPU-only runner.
# Throwaway staging workflow: never merged.

on:
  push:
    branches: [codefix-client-tool-passthrough]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        tools_mode: [default, disable]
        agent: [pi, codex, claude-code]
        model:
          - { repo: "unsloth/gemma-4-E2B-it-GGUF", variant: "UD-Q4_K_XL" }
    name: ${{ matrix.agent }} / ${{ matrix.tools_mode }}
    env:
      STUDIO_PORT: "8888"
      TASK_PROMPT: "Create a short Python Fibonacci function in a file called fib.py. Keep it under 15 lines."
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake build-essential libcurl4-openssl-dev jq

      - name: Install Unsloth Studio (released one-liner)
        run: |
          set -x +e
          curl -fsSL https://unsloth.ai/install.sh | sh 2>&1 | tee "$HOME/install.log" | tail -40
          UNSLOTH_BIN=""
          for c in "$HOME/.unsloth/studio/unsloth_studio/bin/unsloth" "$HOME/.local/bin/unsloth" "$(command -v unsloth || true)"; do
            if [ -n "$c" ] && [ -x "$c" ]; then UNSLOTH_BIN="$c"; break; fi
          done
          [ -n "$UNSLOTH_BIN" ] || UNSLOTH_BIN="$(find "$HOME/.unsloth" "$HOME/.local/bin" -maxdepth 5 -name unsloth -type f 2>/dev/null | head -1)"
          [ -n "$UNSLOTH_BIN" ] && [ -x "$UNSLOTH_BIN" ] || { echo "STUDIO INSTALL FAILED"; tail -150 "$HOME/install.log"; exit 1; }
          echo "$(dirname "$UNSLOTH_BIN")" >> "$GITHUB_PATH"

      - name: Overlay this branch's Studio code into the install
        run: |
          set -x +e
          VENV="$HOME/.unsloth/studio/unsloth_studio"
          "$VENV/bin/python" -m pip install --no-deps --force-reinstall "$GITHUB_WORKSPACE" 2>&1 | tail -25
          # confirm the patched symbols are in the INSTALLED package (locate the
          # file directly; importing it fails because the backend uses top-level
          # imports that only resolve with studio/backend on sys.path).
          INST=$(find "$VENV" -path "*site-packages/studio/backend/routes/inference.py" 2>/dev/null | head -1)
          echo "installed inference.py: $INST"
          if [ -n "$INST" ] && grep -q "_client_tool_passthrough" "$INST" && grep -q "_client_first" "$INST"; then
            echo "OVERLAY OK: fix present in installed code"
          else
            echo "OVERLAY FAILED: fix not present"; ls -la "$(dirname "$INST")" 2>/dev/null; exit 1
          fi

      - name: Serve model + capture key/id
        run: |
          set -x +e
          cd "$HOME"  # avoid the checkout's studio/ shadowing the installed pkg
          SUB="run"; unsloth run --help >/dev/null 2>&1 || SUB="studio run"
          EXTRA=""; if [ "${{ matrix.tools_mode }}" = "disable" ]; then EXTRA="--disable-tools"; fi
          nohup unsloth $SUB --model "${{ matrix.model.repo }}:${{ matrix.model.variant }}" \
            $EXTRA -H 127.0.0.1 -p "$STUDIO_PORT" > "$HOME/studio.log" 2>&1 &
          echo "$!" > "$HOME/studio.pid"
          KEY=""
          for i in $(seq 1 120); do
            KEY=$(grep -oE "sk-unsloth-[A-Za-z0-9_-]+" "$HOME/studio.log" 2>/dev/null | head -1)
            [ -n "$KEY" ] && break
            kill -0 "$(cat "$HOME/studio.pid")" 2>/dev/null || { echo "studio exited early"; break; }
            sleep 5
          done
          tail -40 "$HOME/studio.log" 2>/dev/null
          [ -n "$KEY" ] || { echo "NO API KEY"; tail -200 "$HOME/studio.log" 2>/dev/null; exit 1; }
          echo "STUDIO_KEY=$KEY" >> "$GITHUB_ENV"
          MODEL_ID=""
          for i in $(seq 1 150); do
            MODEL_ID=$(curl -s -m 5 "http://127.0.0.1:$STUDIO_PORT/v1/models" -H "Authorization: Bearer $KEY" 2>/dev/null | jq -r '.data[0].id // empty' 2>/dev/null)
            [ -n "$MODEL_ID" ] && break
            sleep 5
          done
          [ -n "$MODEL_ID" ] || { echo "MODEL DID NOT LOAD"; tail -200 "$HOME/studio.log" 2>/dev/null; exit 1; }
          echo "MODEL_ID=$MODEL_ID" >> "$GITHUB_ENV"
          echo "Resolved MODEL_ID=$MODEL_ID (mode=${{ matrix.tools_mode }})"

      # ---------------- Pi ----------------
      - name: Pi - run
        if: matrix.agent == 'pi'
        run: |
          set -x +e
          npm install -g @mariozechner/pi-coding-agent >/dev/null 2>&1
          mkdir -p "$HOME/.pi/agent"
          cat > "$HOME/.pi/agent/models.json" <<EOF
          {"providers":{"unsloth":{"baseUrl":"http://127.0.0.1:$STUDIO_PORT/v1","api":"openai-completions","apiKey":"$STUDIO_KEY","models":[{"id":"$MODEL_ID","input":["text"]}]}}}
          EOF
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q
          # Retry the trivial task: tiny CPU models are nondeterministic and may
          # emit a sloppy tool sequence (e.g. an empty file) on a given attempt.
          for attempt in 1 2 3; do
            rm -f fib.py
            echo "=== PI attempt $attempt ==="
            PI_OFFLINE=1 timeout 480 pi -p --provider unsloth --model "$MODEL_ID" "$TASK_PROMPT" 2>&1 | tee "$HOME/agent_out.log"
            grep -qiE "def fib|fibonacci" fib.py 2>/dev/null && break
          done
          echo "PI done"

      # ---------------- Codex (responses path regression) ----------------
      - name: Codex - run
        if: matrix.agent == 'codex'
        run: |
          set -x +e
          npm install -g @openai/codex >/dev/null 2>&1
          mkdir -p "$HOME/.codex" "$HOME/proj"
          export UNSLOTH_STUDIO_AUTH_TOKEN="$STUDIO_KEY"
          cat > "$HOME/.codex/config.toml" <<EOF
          oss_provider = "unsloth_api"

          [model_providers.unsloth_api]
          name                  = "Unsloth Studio"
          base_url              = "http://localhost:$STUDIO_PORT/v1"
          env_key               = "UNSLOTH_STUDIO_AUTH_TOKEN"
          wire_api              = "responses"
          requires_openai_auth  = false
          EOF
          cat > "$HOME/.codex/unsloth_api.config.toml" <<EOF
          model_provider = "unsloth_api"
          model = "$MODEL_ID"
          EOF
          cd "$HOME/proj" && git init -q
          # Retry: tiny CPU models sometimes emit a sloppy tool sequence (e.g.
          # `touch fib.py` then narrate) on a given attempt.
          for attempt in 1 2 3; do
            rm -f fib.py
            echo "=== CODEX attempt $attempt ==="
            timeout 420 codex exec --oss --profile unsloth_api --skip-git-repo-check \
              --dangerously-bypass-approvals-and-sandbox "$TASK_PROMPT" 2>&1 | tee "$HOME/agent_out.log"
            grep -qiE "def fib|fibonacci" fib.py 2>/dev/null && break
          done
          echo "CODEX done"

      # ---------------- Claude Code (messages path) ----------------
      - name: Claude Code - probe + run
        if: matrix.agent == 'claude-code'
        run: |
          set -x +e
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 || curl -fsSL https://claude.ai/install.sh | bash
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p "$HOME/proj" && cd "$HOME/proj" && git init -q && rm -f fib.py
          # The fix's target: in DEFAULT mode /v1/messages must now relay the
          # caller's own tool as a tool_use (not swallow it server-side).
          cat > "$HOME/probe.json" <<EOF
          {"model":"$MODEL_ID","max_tokens":700,"tool_choice":{"type":"auto"},
           "tools":[{"name":"write_file","description":"Write text to a file",
             "input_schema":{"type":"object","properties":{
               "path":{"type":"string"},"content":{"type":"string"}},
               "required":["path","content"]}}],
           "messages":[{"role":"user","content":"Create fib.py containing a Python fibonacci function. Use the write_file tool."}]}
          EOF
          PROBE=$(curl -s -m 240 "http://localhost:$STUDIO_PORT/v1/messages" \
            -H "Authorization: Bearer $STUDIO_KEY" -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" -d @"$HOME/probe.json")
          echo "PROBE RESPONSE (head): $(echo "$PROBE" | head -c 1000)"
          if echo "$PROBE" | grep -q '"type"[[:space:]]*:[[:space:]]*"tool_use"'; then
            echo "PROBE: /v1/messages relayed a tool_use"
            touch "$HOME/proj/.integration_ok"
          else
            echo "PROBE: no tool_use relayed"
          fi
          claude --version
          export ANTHROPIC_BASE_URL="http://localhost:$STUDIO_PORT"
          export ANTHROPIC_AUTH_TOKEN="$STUDIO_KEY"
          export ANTHROPIC_MODEL="$MODEL_ID"; export ANTHROPIC_SMALL_FAST_MODEL="$MODEL_ID"
          timeout 480 claude -p "$TASK_PROMPT" --model "$MODEL_ID" --dangerously-skip-permissions 2>&1 | tee "$HOME/agent_out.log"
          echo "CLAUDE EXIT: ${PIPESTATUS[0]}"

      - name: Diagnostics (always)
        if: always()
        run: |
          set +e
          echo "########## AGENT OUTPUT ##########"; tail -80 "$HOME/agent_out.log" 2>/dev/null || echo "(none)"
          echo "########## fib.py ? ##########"
          if [ -f "$HOME/proj/fib.py" ]; then echo "CREATED:"; cat "$HOME/proj/fib.py"; else echo "NOT created"; fi
          echo "########## STUDIO LOG ##########"; tail -60 "$HOME/studio.log" 2>/dev/null || echo "(none)"

      - name: Validate (fix must make this pass in BOTH modes)
        if: always()
        run: |
          set +e
          AG="${{ matrix.agent }}"; MODE="${{ matrix.tools_mode }}"
          OK=1; REASON=""
          if grep -qiE "def fib|fibonacci" "$HOME/proj/fib.py" 2>/dev/null; then OK=0; REASON="fib.py created"; fi
          if [ "$AG" = "claude-code" ] && [ -f "$HOME/proj/.integration_ok" ]; then
            OK=0; REASON="${REASON:+$REASON + }/v1/messages tool relay OK"
          fi
          if [ "$OK" -eq 0 ]; then
            echo "RESULT: PASS ($AG / $MODE) -- $REASON"
          else
            echo "RESULT: FAIL ($AG / $MODE)"; exit 1
          fi

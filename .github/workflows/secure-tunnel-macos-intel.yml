name: "secure-tunnel macos-15-intel (x86_64)"
on:
  push:
    branches: [secure-tunnel-validation]
    paths:
      - 'studio/backend/cloudflare_tunnel.py'
      - 'studio/backend/tests/secure_tunnel_e2e.py'
      - '.github/workflows/secure-tunnel-macos-intel.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/backend/cloudflare_tunnel.py'
      - 'studio/backend/tests/secure_tunnel_e2e.py'
      - '.github/workflows/secure-tunnel-macos-intel.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  e2e:
    runs-on: macos-15-intel
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cloudflare quick-tunnel end-to-end
        run: python -u studio/backend/tests/secure_tunnel_e2e.py

name: PR5720 ubuntu

on:
  push:
    branches: [pr5720-cross-os]
    paths:
      - 'studio/backend/**'
      - 'studio/desktop/**'
      - '.github/workflows/pr5720-ubuntu.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/backend/**'
      - '.github/workflows/pr5720-ubuntu.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: ${{ github.workspace }}/studio
      UNSLOTH_COMPILE_DISABLE: '1'
      UNSLOTH_IS_PRESENT: '1'
      PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r studio/backend/requirements/studio.txt
          python -m pip install 'pytest==9.0.3' pytest-asyncio pytest-timeout

      - name: Show env
        run: |
          python -V
          python -c "import sys; print(sys.platform)"
          pip list 2>/dev/null | head -40

      - name: Run Gemini provider backend tests
        run: |
          python -m pytest -v --tb=short --timeout=60 \
            studio/backend/tests/test_gemini_provider.py \
            studio/backend/tests/test_external_provider_usage_chunk.py \
            studio/backend/tests/test_providers_api.py

# End-to-end proof that the isolated-Node change does not regress a real Studio
# install + GGUF inference. Forces the ISOLATED Node path (no system npm >= 11),
# asserts setup used the isolated Node and built the frontend, then loads a GGUF
# and generates on Linux + macOS (CPU, no GPU).
#
# Uses a small TEXT GGUF (gemma-3-270m-it) so it loads on the GPU-less runners
# (Studio gates vision models like gemma-4-E2B to a GPU/Metal -> "chat_only"
# runners 403 on a vision load). gemma-4-E2B-it-GGUF UD-Q4_K_XL itself is
# validated by studio-mac-inference-smoke's vision job on the Metal runner.
name: node-gemma4-inference

on:
  push:
    branches: [pr-node-isolated-0620]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  infer:
    name: isolated-node + inference ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    env:
      GGUF_REPO: unsloth/gemma-3-270m-it-GGUF
      GGUF_VARIANT: UD-Q4_K_XL
      GGUF_FILE: gemma-3-270m-it-UD-Q4_K_XL.gguf
      STUDIO_PORT: '18888'
      HF_HOME: ${{ github.workspace }}/hf-cache
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Linux deps for llama.cpp prebuilt
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev libssl-dev jq

      # setup-node@22 lands Node 22 + npm 10.x -- intentionally below npm>=11, so
      # setup decides "bundled" and provisions an isolated Node (the path we want
      # to validate). We do NOT upgrade npm here.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show system node/npm (should be < npm 11 -> isolated path)
        run: |
          echo "system node: $(node -v)  npm: $(npm -v)"

      - name: Prime HF_HOME with the GGUF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m pip install --upgrade huggingface_hub
          mkdir -p hf-cache
          bash .github/scripts/hf-download-with-retry.sh "$GGUF_REPO" "$GGUF_FILE"

      - name: Install Studio (--local, --no-torch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p logs
          set -o pipefail
          bash install.sh --local --no-torch 2>&1 | tee logs/install.log

      - name: Assert the ISOLATED Node path was used and frontend built
        run: |
          set -e
          if ! grep -Eq "isolated Node|\(isolated\)" logs/install.log; then
            echo "::error::install did not use the isolated Node path"
            grep -Ei "node|npm" logs/install.log | tail -40
            exit 1
          fi
          NODE_DIR=~/.unsloth/node
          test -f "$NODE_DIR/UNSLOTH_NODE_PREBUILT_INFO.json"
          "$NODE_DIR/bin/node" -v | grep -Eq '^v(2[4-9]|[3-9][0-9])\.'
          NPM_MAJOR=$("$NODE_DIR/bin/node" "$NODE_DIR/lib/node_modules/npm/bin/npm-cli.js" -v | cut -d. -f1)
          [ "$NPM_MAJOR" -ge 11 ]
          test -d studio/frontend/dist
          ls studio/frontend/dist/assets/*.js >/dev/null
          echo "isolated Node path confirmed; frontend dist built"

      - name: Reset auth + boot Studio (API-only)
        run: |
          unsloth studio reset-password
          mkdir -p logs
          UNSLOTH_API_ONLY=1 unsloth studio -H 127.0.0.1 -p "$STUDIO_PORT" > logs/studio.log 2>&1 &
          echo "STUDIO_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 180); do
            if curl -fs "http://127.0.0.1:${STUDIO_PORT}/api/health" > health.json; then
              cat health.json; exit 0
            fi
            sleep 1
          done
          echo "Studio did not become healthy"; tail -200 logs/studio.log; exit 1

      - name: Load the GGUF and generate
        run: |
          set -uo pipefail
          PW=$(cat ~/.unsloth/studio/auth/.bootstrap_password)
          echo "::add-mask::$PW"
          [ -n "$PW" ] || { echo "::error::empty bootstrap password"; tail -100 logs/studio.log; exit 1; }

          # Bootstrap login.
          RESP=$(curl -s -w $'\n%{http_code}' -X POST "http://127.0.0.1:${STUDIO_PORT}/api/auth/login" \
            -H 'content-type: application/json' -d "{\"username\":\"unsloth\",\"password\":\"$PW\"}")
          CODE=$(printf '%s' "$RESP" | tail -1); BODY=$(printf '%s' "$RESP" | sed '$d')
          echo "login HTTP $CODE"; [ "$CODE" = "200" ] || { echo "::error::login: $BODY"; exit 1; }
          BTOKEN=$(printf '%s' "$BODY" | jq -r .access_token)

          # Rotate the bootstrap password -- privileged ops (model load) are gated
          # behind a rotated credential, so the bootstrap token alone 403s.
          NEW="CIRot-$(python -c 'import secrets; print(secrets.token_urlsafe(12))')"
          echo "::add-mask::$NEW"
          curl -fs -X POST "http://127.0.0.1:${STUDIO_PORT}/api/auth/change-password" \
            -H "Authorization: Bearer $BTOKEN" -H 'content-type: application/json' \
            -d "{\"current_password\":\"$PW\",\"new_password\":\"$NEW\"}" > /dev/null
          RESP=$(curl -s -w $'\n%{http_code}' -X POST "http://127.0.0.1:${STUDIO_PORT}/api/auth/login" \
            -H 'content-type: application/json' -d "{\"username\":\"unsloth\",\"password\":\"$NEW\"}")
          CODE=$(printf '%s' "$RESP" | tail -1); BODY=$(printf '%s' "$RESP" | sed '$d')
          echo "re-login HTTP $CODE"; [ "$CODE" = "200" ] || { echo "::error::re-login: $BODY"; exit 1; }
          TOKEN=$(printf '%s' "$BODY" | jq -r .access_token)
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "::error::no token"; exit 1; }

          RESP=$(curl -s -w $'\n%{http_code}' -X POST "http://127.0.0.1:${STUDIO_PORT}/api/inference/load" \
            -H "Authorization: Bearer $TOKEN" -H 'content-type: application/json' --max-time 900 \
            -d "{\"model_path\":\"$GGUF_REPO\",\"gguf_variant\":\"$GGUF_VARIANT\",\"is_lora\":false,\"max_seq_length\":2048}")
          CODE=$(printf '%s' "$RESP" | tail -1); BODY=$(printf '%s' "$RESP" | sed '$d')
          echo "load HTTP $CODE"; printf '%s\n' "$BODY" | jq '{status, display_name, is_gguf, context_length}' || printf '%s\n' "$BODY"
          [ "$CODE" = "200" ] || { echo "::error::load failed"; tail -120 logs/studio.log; exit 1; }

          RESP=$(curl -s -w $'\n%{http_code}' -X POST "http://127.0.0.1:${STUDIO_PORT}/v1/chat/completions" \
            -H "Authorization: Bearer $TOKEN" -H 'content-type: application/json' --max-time 300 \
            -d '{"model":"default","messages":[{"role":"user","content":"In one short sentence, what is Unsloth?"}],"temperature":0.0,"max_tokens":48}')
          CODE=$(printf '%s' "$RESP" | tail -1); BODY=$(printf '%s' "$RESP" | sed '$d')
          echo "generate HTTP $CODE"; [ "$CODE" = "200" ] || { echo "::error::generate: $BODY"; exit 1; }
          printf '%s\n' "$BODY" | jq -r '.choices[0].message.content'
          printf '%s\n' "$BODY" | jq -e '.choices[0].message.content | length > 0' >/dev/null
          echo "isolated-node Studio inference OK on ${{ matrix.os }}"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemma4-${{ matrix.os }}-logs
          path: logs/
          if-no-files-found: ignore

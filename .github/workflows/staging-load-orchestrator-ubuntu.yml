# Event-loop regression test for Unsloth Studio issue #5642 on
# ubuntu-latest. Stands up a stdlib fake llama-server + a tiny FastAPI
# app via uvicorn and proves that detect_audio_type must run via
# asyncio.to_thread to keep the /load route responsive.
#
# CPU-only, no torch, no real llama.cpp binary, no GPU. The matching
# macOS / Windows workflows are byte-for-byte identical except for
# runs-on and the workflow name. Edit all three together.

name: Staging load-orchestrator CI (ubuntu)

on:
  push:
    branches: [fix-5642-studio-load-event-loop]
    paths:
      - 'studio/backend/routes/inference.py'
      - 'studio/backend/core/inference/llama_cpp.py'
      - 'tests/studio/load_freeze/**'
      - '.github/workflows/staging-load-orchestrator-*.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install minimal deps (no torch, no unsloth)
        # The test stubs `loggers` and `structlog`, imports
        # core.inference.llama_cpp directly, and drives a small
        # FastAPI app. Nothing here pulls torch or any GPU code.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'pytest>=8' \
            'httpx>=0.27,<1' \
            'fastapi>=0.110,<1' \
            'uvicorn>=0.30,<1' \
            'anyio>=4'
      - name: Run load-orchestrator tests
        run: python -m pytest -v --tb=short tests/studio/load_freeze/

# STAGING ONLY - DO NOT MERGE.
# Cross-OS validation for unslothai/unsloth#5748: NATIVE Studio on a real Windows
# runner (windows-latest). Windows runners cannot run Linux containers, so this
# installs Studio natively via install.ps1 (CPU backend, no NVIDIA GPU on hosted
# runners) and runs the feature battery. GGUF chat via llama.cpp CPU; MLX is
# Apple-only so it is skipped here.
name: "PR-5748 studio native windows-latest"
on:
  push:
    branches: [pr5748-studio-xos-r3]
    paths:
      - '.github/workflows/studio-native-windows.yml'
      - '.github/scripts/validate_studio_features.py'
      - '.github/scripts/mcp_test_server.py'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
env:
  PRREF: docker-blackwell-build
  BASE: http://127.0.0.1:8888
  MODEL: unsloth/Qwen3.5-0.8B-MTP-GGUF
  GGUF_VARIANT: UD-Q4_K_XL
jobs:
  native-studio:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          repository: unslothai/unsloth
          ref: ${{ env.PRREF }}
          path: pr
          persist-credentials: false

      - name: Install Studio natively (install.ps1 --local, CPU)
        shell: pwsh
        run: |
          $home2 = Join-Path $env:RUNNER_TEMP 'ustudio'
          "UNSLOTH_STUDIO_HOME=$home2" | Out-File -FilePath $env:GITHUB_ENV -Append
          $env:UNSLOTH_STUDIO_HOME = $home2
          Set-Location pr
          .\install.ps1 --local

      - name: Launch Studio (bind 0.0.0.0 for cloudflare)
        shell: pwsh
        run: |
          $uns = Join-Path $env:UNSLOTH_STUDIO_HOME 'bin\unsloth.exe'
          if (-not (Test-Path $uns)) { $uns = 'unsloth' }
          Write-Host "launcher: $uns"
          Start-Process -FilePath $uns -ArgumentList 'studio','-H','0.0.0.0','-p','8888','--cloudflare' `
            -RedirectStandardOutput studio.log -RedirectStandardError studio.err -NoNewWindow
          $ok = $false
          for ($i=0; $i -lt 120; $i++) {
            try { if ((Invoke-WebRequest -UseBasicParsing "$env:BASE/api/health").StatusCode -eq 200) { $ok=$true; break } } catch {}
            Start-Sleep 5
          }
          if (-not $ok) { throw "Studio did not become healthy" }
          Write-Host "health 200"

      - name: Feature battery (native, CPU)
        shell: pwsh
        run: |
          $py = Join-Path $env:UNSLOTH_STUDIO_HOME 'unsloth_studio\Scripts\python.exe'
          if (-not (Test-Path $py)) { $py = 'python' }
          python .github/scripts/validate_studio_features.py `
            --mode native --base-url $env:BASE `
            --studio-home $env:UNSLOTH_STUDIO_HOME --log-file studio.log `
            --model $env:MODEL --gguf-variant $env:GGUF_VARIANT `
            --mcp-python $py --out battery.json

      - name: Diagnostics
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== studio.log (tail) ==="
          if (Test-Path studio.log) { Get-Content studio.log -Tail 200 }
          if (Test-Path studio.err) { Get-Content studio.err -Tail 80 }
          Write-Host "=== battery.json ==="
          if (Test-Path battery.json) { Get-Content battery.json }

name: "cuda133-fix windows-latest"
on:
  push:
    branches: [pr-cuda133-staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  shell:
    runs-on: windows-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - name: bash --version
        run: bash --version
      - name: nvcc helper test (git-bash)
        # studio/setup.sh is the Linux/macOS installer; on Windows we still
        # care that the helper logic parses under git-bash since CI smoke
        # workflows source bash on Windows runners.
        run: bash tests/sh/test_nvcc_meets_llama_minimum.sh

# Staging-fork-only smoke. Two purposes:
#   1. Verify the Linux llama.cpp prebuilt install picks up the new
#      libllama-<binary>-impl.so* shared libraries upstream introduced
#      around release b9261. Without copying those alongside the
#      binaries, ldd reports them missing and the installer falls back
#      to a source build (slow + breaks the update CI assertion).
#   2. Confirm `unsloth studio setup` boots without the pydantic /
#      pydantic-core mismatch that hit fresh venvs on the --no-torch
#      path.
#
# No NVIDIA GPU is available on the free runner; we rely on the
# CUDA-spoof harness Unsloth already ships
# (tests/conftest.py + tests/_zoo_aggressive_cuda_spoof.py) for any
# import-time CUDA assertions.

name: Staging Install (Linux)

on:
  push:
    branches: [ci/general-fix-2026-05-23]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'studio/install_llama_prebuilt.py'
      - 'studio/install_python_stack.py'
      - 'studio/backend/requirements/no-torch-runtime.txt'
      - 'studio/frontend/src/features/auth/components/auth-form.tsx'
      - '.github/workflows/staging-install-linux.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-install:
    name: Linux Studio install (--local, --no-torch) + llama.cpp prebuilt
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
      UNSLOTH_DISABLE_AUTO_INSTALL_CHECK: '1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Linux deps for llama.cpp prebuilt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build curl ca-certificates jq

      - name: Run installer (--local --no-torch)
        run: |
          set -o pipefail
          mkdir -p logs
          chmod +x install.sh
          ./install.sh --local --no-torch 2>&1 | tee logs/install.log

      - name: Assert installer never fell back to source build
        run: |
          if grep -E "prebuilt fallback reason|falling back to source build" logs/install.log; then
            echo "::error::Linux prebuilt llama.cpp fell back to source build. The libllama-*-impl.so* pattern fix did not take effect."
            grep -E "llama-prebuilt|llama.cpp" logs/install.log | tail -120 || true
            exit 1
          fi

      - name: Confirm impl shared libraries copied into install dir
        run: |
          set -o pipefail
          install_dir="$HOME/.unsloth/llama.cpp"
          if [ ! -d "$install_dir" ]; then
            echo "::error::Expected llama.cpp install dir at $install_dir"
            ls -la "$HOME/.unsloth" || true
            exit 1
          fi
          echo "Contents of $install_dir:"
          ls -la "$install_dir"
          # Sample the impl libs we expect (NEEDED by llama-server and llama-quantize).
          for lib in libllama-server-impl.so libllama-quantize-impl.so; do
            if [ ! -f "$install_dir/$lib" ]; then
              echo "::error::Missing $lib in $install_dir -- runtime_patterns_for_choice regression"
              exit 1
            fi
          done

      - name: Confirm ldd finds all libs for llama-server / llama-quantize
        run: |
          set -o pipefail
          install_dir="$HOME/.unsloth/llama.cpp"
          export LD_LIBRARY_PATH="$install_dir:${LD_LIBRARY_PATH:-}"
          for bin in llama-server llama-quantize; do
            if ! ldd "$install_dir/$bin" > "logs/ldd-$bin.txt"; then
              echo "::error::ldd failed on $bin"
              cat "logs/ldd-$bin.txt" || true
              exit 1
            fi
            if grep -q "not found" "logs/ldd-$bin.txt"; then
              echo "::error::Unresolved libraries for $bin"
              cat "logs/ldd-$bin.txt"
              exit 1
            fi
          done

      - name: Confirm pydantic / pydantic-core pair is consistent
        run: |
          set -o pipefail
          studio_py="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          if [ ! -x "$studio_py" ]; then
            echo "::error::Studio venv python not at $studio_py"
            ls -la "$HOME/.unsloth/studio" || true
            exit 1
          fi
          "$studio_py" -c "import pydantic; import pydantic_core; print('pydantic', pydantic.VERSION); print('pydantic_core', pydantic_core.__version__)"

      - name: unsloth studio --help (smoke)
        run: |
          export PATH="$HOME/.unsloth/studio/unsloth_studio/bin:$PATH"
          unsloth studio --help | head -40

      - name: Upload install logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-install-logs
          path: |
            logs/

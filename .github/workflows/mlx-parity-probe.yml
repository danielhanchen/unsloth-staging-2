#
# MLX vs HF parity bisection probes.
#
# Why this workflow exists:
#   The upstream MLX CI on `unslothai/unsloth` is failing the
#   in-memory generation assertion in tests/studio/run_real_mlx_smoke.py
#   (model emits "5 lbs!" instead of containing "Unsloth"). The CUDA
#   mirror in temp/torchcodec_test/cuda_mirror.py emits "Unsloth" under
#   every clip setting tested. Step-1 forward-pass loss is 7.64 on CUDA
#   and 10.55 on MLX for the IDENTICAL model + data + seed -- a 1.38x
#   pre-optimizer-step discrepancy. The clipping override fixed by
#   unsloth-zoo#663 is a real bug but does not explain the loss gap.
#
#   This workflow runs 7 small probes on a real macos-14-arm64 runner
#   that bisect the parity gap across the dispatch path:
#     1. tokenization              identical input ids?
#     2. base-model forward logits identical logits?
#     3. loss reduction (synthetic)same CE-mean number?
#     4. LoRA init                 B=0 in both; A std comparable?
#     5. single backward           gradient norms comparable?
#     6. AdamW step (synthetic)    same post-step weight?
#     7. 7-step loss curve         data dump for follow-up analysis
#
#   continue-on-error: true on each probe so a single divergence does
#   not hide the diagnostics for the later probes.
#
# Status: experimental / debug. Surfaces "MLX parity probes" PR check.

name: MLX parity probes

on:
  pull_request:
    paths:
      - 'tests/mlx_parity/**'
      - '.github/workflows/mlx-parity-probe.yml'
  push:
    branches: [mlx-parity-probes]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  probes:
    name: probes
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Harden runner (audit)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # MLX + mlx-lm for the MLX-side calls
          pip install \
            'mlx==0.30.0' \
            'mlx-lm==0.30.0' \
            'numpy==2.4.4' \
            'pytest==9.0.3'
          # torch CPU for the HF-side calls; CPU is fine since we're
          # measuring losses + grad norms, not throughput
          pip install --index-url https://download.pytorch.org/whl/cpu \
            'torch==2.10.0'
          # transformers + peft for HF SFTTrainer parity
          pip install \
            'transformers==4.57.6' \
            'peft==0.18.0' \
            'datasets==4.3.0' \
            'accelerate==1.13.0' \
            'sentencepiece==0.2.1' \
            'huggingface-hub==0.36.2'
          # unsloth-zoo from git (provides unsloth_zoo.mlx.* on Apple Silicon)
          for attempt in 1 2 3; do
            if pip install "unsloth_zoo @ git+https://github.com/unslothai/unsloth-zoo"; then break; fi
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((5*attempt))
          done

      - name: Probe 1 — tokenization parity
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd tests/mlx_parity && python probe_1_tokenization.py

      - name: Probe 2 — base-model forward logits parity
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd tests/mlx_parity && python probe_2_forward_logits.py

      - name: Probe 3 — loss reduction parity (synthetic)
        if: always()
        continue-on-error: true
        run: |
          cd tests/mlx_parity && python probe_3_loss_reduction.py

      - name: Probe 4 — LoRA init parity
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd tests/mlx_parity && python probe_4_lora_init.py

      - name: Probe 5 — single backward parity
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd tests/mlx_parity && python probe_5_single_grad.py

      - name: Probe 6 — AdamW step parity (synthetic)
        if: always()
        continue-on-error: true
        run: |
          cd tests/mlx_parity && python probe_6_adamw_step.py

      - name: Probe 7 — 7-step MLX loss curve (data dump)
        if: always()
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          UNSLOTH_COMPILE_DISABLE: '1'
        run: |
          cd tests/mlx_parity && python probe_7_loss_curve.py

      - name: Aggregate probe results
        if: always()
        run: |
          set +e
          echo "=== Aggregated probe JSON dumps ==="
          for i in 1 2 3 4 5 6 7; do
            echo "--- probe_${i}.json ---"
            cat tests/mlx_parity/.out/probe_${i}.json 2>/dev/null || echo "(missing -- probe ${i} did not run or crashed)"
            echo
          done

      - name: Upload probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-parity-probe-output
          path: tests/mlx_parity/.out/
          if-no-files-found: warn

# Studio install + import smoke on Windows ARM64 (windows-11-arm).
# Rare but real: Snapdragon X / Surface Pro / Surface Laptop fall in
# this bucket. Exercising the path catches Path/encoding bugs that
# only surface on the native arm64 Python.
name: "Studio install Windows ARM64"

on:
  push:
    branches: [studio-cross-platform-ci]
    paths:
      - 'studio/**'
      - 'unsloth/**'
      - 'unsloth_cli/**'
      - 'install.ps1'
      - 'pyproject.toml'
      - '.github/workflows/studio-install-windows-arm.yml'
  pull_request:
    paths:
      - 'studio/**'
      - 'unsloth/**'
      - 'unsloth_cli/**'
      - 'install.ps1'
      - 'pyproject.toml'
      - '.github/workflows/studio-install-windows-arm.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    runs-on: windows-11-arm
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Show env
        run: |
          python -V
          pip --version
          Get-ComputerInfo OsName, OsVersion, OsArchitecture, CsProcessors 2>$null

      - name: Pip install unsloth + studio backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r studio/backend/requirements/studio.txt

      - name: Smoke import (Windows arm64, no CUDA)
        env:
          UNSLOTH_DISABLE_AUTO_UPDATES: '1'
        run: |
          python -c "import platform; print('arch:', platform.machine(), 'system:', platform.system())"
          python -c "import unsloth_cli; print('unsloth_cli ok')"
          python -c "from studio.backend.main import app; print('studio.backend.main:app ok', type(app).__name__)"

      - name: CLI help
        env:
          UNSLOTH_DISABLE_AUTO_UPDATES: '1'
        run: |
          unsloth --help
          unsloth studio --help

# Throwaway staging-fork validation (PRs #5620 / #5624 / #5704, combined).
# Linux baseline for the same shared tool-call suites the macos-14 job runs, so
# the MLX-shared parser/loop/MLX-backend code is proven green on both OSes.
# Lean (torch-free) install; the 3 torch-bound *native_template* render tests
# are deselected to match the mac job (they pass in a full torch env locally
# and are gated upstream by studio-backend-ci.yml).
name: studio-toolcall-linux

on:
  push:
    branches: [studio-toolcall-mlx-ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  toolcall-linux:
    name: tool-call suites (Linux baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      UNSLOTH_COMPILE_DISABLE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lean backend deps (parser/loop are torch-free)
        run: |
          python -m pip install --upgrade pip
          pip install -r studio/backend/requirements/studio.txt
          pip install \
            python-multipart aiofiles sqlalchemy cryptography \
            pyyaml jinja2 mammoth unpdf requests \
            'numpy<3' pytest pytest-asyncio pytest-timeout httpx

      - name: Tool-call parser + agentic loop + MLX backend suites
        working-directory: studio/backend
        run: |
          python -m pytest -q --tb=short \
            tests/test_tool_call_parser_strict.py \
            tests/test_tool_xml_strip.py \
            tests/test_gemma_tool_parse_edge_cases.py \
            tests/test_safetensors_tool_loop.py \
            tests/test_tool_loop_controller.py \
            tests/test_mlx_inference_backend.py \
            -k 'not native_template'

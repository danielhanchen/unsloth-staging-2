name: cuda-spoof-import-compat

on:
  push:
    branches: [studio-regression-ci]
    paths:
      - tests/**
      - unsloth/**
      - pyproject.toml
      - .github/workflows/cuda-spoof-import-compat.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  imports:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install transformers pytest bitsandbytes peft accelerate
          python -m pip install git+https://github.com/unslothai/unsloth_zoo

      - name: Activate CUDA spoof + vllm_compat imports
        env:
          PYTHONPATH: tests
        run: |
          cat > tests/_apply_spoof.py <<'PY'
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path(__file__).resolve().parent))
          import _zoo_aggressive_cuda_spoof as _spoof
          _spoof.apply()
          PY
          python -c "import _apply_spoof; import torch; print('cuda available:', torch.cuda.is_available()); print('device:', torch.cuda.get_device_name(0))"
          pytest -q tests/vllm_compat/test_extended_module_imports.py tests/vllm_compat/test_unsloth_zoo_imports.py

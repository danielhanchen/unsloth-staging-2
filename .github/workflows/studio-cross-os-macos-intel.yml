# Cross-OS staging validation: Unsloth Studio on Intel macOS (x86_64).
# PyTorch dropped Intel Mac wheels in Jan 2024, so install.sh detects
# MAC_INTEL=true and forces SKIP_TORCH=true. This job verifies the
# GGUF-only install path: Studio boots, /api/health is healthy, even
# without torch in the venv. The llama.cpp prebuilt is the
# llama-bNNNN-bin-macos-x64.zip variant.

name: Studio cross-OS smoke (macOS Intel)

on:
  push:
    branches: [studio-cross-os-validation]
  pull_request:
    branches: [main]
    paths:
      - 'install.sh'
      - 'studio/**'
      - 'unsloth_cli/**'
      - 'pyproject.toml'
      - '.github/workflows/studio-cross-os-macos-intel.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: install + boot Studio (macOS Intel)
    runs-on: macos-15-intel
    timeout-minutes: 30
    env:
      STUDIO_PORT: '18903'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Record platform fingerprint
        run: |
          uname -a
          uname -m
          sw_vers
          # Confirms we really are on an Intel Mac (not Apple Silicon
          # under Rosetta). install.sh has the same guard inline.
          if [ "$(sysctl -in hw.optional.arm64 2>/dev/null || echo 0)" = "1" ]; then
            echo "::warning::Apple Silicon detected under Rosetta -- this is not a real Intel Mac"
          else
            echo "Confirmed Intel Mac (sysctl hw.optional.arm64 == 0/absent)"
          fi
          python -c "import platform, sys; print('python', sys.version); print('machine', platform.machine())"

      - name: Install Studio (--local)
        # No --no-torch flag: install.sh auto-detects Intel Mac and
        # forces SKIP_TORCH=true via the MAC_INTEL branch. We pass
        # --local only, to assert the auto-detect path actually fires.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          set -o pipefail
          bash install.sh --local 2>&1 | tee logs/install.log

      - name: Assert Intel-Mac auto-skip-torch path fired
        run: |
          if ! grep -qE "Intel Mac \(x86_64\) detected|GGUF-only mode" logs/install.log; then
            echo "::error::install.sh did not announce the Intel-Mac auto-skip-torch path."
            grep -Ei "intel|x86_64|skip_torch|gguf" logs/install.log | tail -40
            exit 1
          fi
          if grep -q "falling back to source build" logs/install.log; then
            echo "::error::install.sh fell back to source-build llama.cpp on Intel Mac."
            grep -E "llama-prebuilt|llama.cpp|prebuilt" logs/install.log | tail -60
            exit 1
          fi
          if grep -Eq "llama-b[0-9]+-bin-macos-arm64" logs/install.log; then
            echo "::error::install.sh picked the ARM64 macOS llama.cpp prebuilt on an Intel host."
            grep -E "llama-prebuilt|llama.cpp|prebuilt" logs/install.log | tail -60
            exit 1
          fi
          INFO=$HOME/.unsloth/llama.cpp/UNSLOTH_PREBUILT_INFO.json
          if [ ! -f "$INFO" ]; then
            echo "::error::no UNSLOTH_PREBUILT_INFO.json at $INFO."
            ls -la "$(dirname "$INFO")" || true
            exit 1
          fi
          jq . "$INFO"
          jq -e '.asset | test("bin-macos-x64\\.tar\\.gz$")' "$INFO" || {
            echo "::error::UNSLOTH_PREBUILT_INFO.json asset is not a bin-macos-x64 tarball."
            exit 1
          }
          echo "install.sh took the Intel-Mac GGUF-only path correctly"

      - name: Boot Studio (API-only) + /api/health probe
        run: |
          mkdir -p logs
          UNSLOTH_API_ONLY=1 unsloth studio -H 127.0.0.1 -p "$STUDIO_PORT" \
            > logs/studio.log 2>&1 &
          PID=$!
          ok=0
          for i in $(seq 1 180); do
            if curl -fs "http://127.0.0.1:${STUDIO_PORT}/api/health" > /tmp/health.json 2>/dev/null; then
              if jq -e '.status == "healthy"' /tmp/health.json >/dev/null 2>&1; then
                ok=1
                break
              fi
            fi
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          sleep 2
          if [ "$ok" -ne 1 ]; then
            echo "::error::Studio did not reach healthy /api/health within 180s on Intel Mac."
            echo "----- studio.log (tail 200) -----"
            tail -200 logs/studio.log || true
            exit 1
          fi
          echo "Studio /api/health healthy on Intel Mac (GGUF-only install)"

      - name: unsloth studio update --local should be a no-op
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          unsloth studio update --local 2>&1 | tee logs/update.log
          if grep -q "falling back to source build" logs/update.log; then
            echo "::error::unsloth studio update fell back to source-build llama.cpp on Intel Mac."
            grep -E "llama-prebuilt|llama.cpp" logs/update.log | tail -60
            exit 1
          fi
          if ! grep -qE "prebuilt up to date and validated|prebuilt installed and validated" logs/update.log; then
            echo "::error::no prebuilt up-to-date marker in update.log."
            grep -E "llama-prebuilt|llama.cpp" logs/update.log | tail -60
            exit 1
          fi
          echo "unsloth studio update --local took the prebuilt fast path on Intel Mac"

      - name: Re-boot Studio after update
        run: |
          mkdir -p logs
          UNSLOTH_API_ONLY=1 unsloth studio -H 127.0.0.1 -p "$STUDIO_PORT" \
            > logs/studio_post_update.log 2>&1 &
          PID=$!
          ok=0
          for i in $(seq 1 120); do
            if curl -fs "http://127.0.0.1:${STUDIO_PORT}/api/health" > /tmp/health.json 2>/dev/null; then
              if jq -e '.status == "healthy"' /tmp/health.json >/dev/null 2>&1; then
                ok=1
                break
              fi
            fi
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          sleep 2
          if [ "$ok" -ne 1 ]; then
            echo "::error::Studio did not reach healthy /api/health within 120s after update on Intel Mac."
            tail -200 logs/studio_post_update.log || true
            exit 1
          fi
          echo "Studio /api/health healthy after update on Intel Mac"

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: studio-cross-os-macos-intel-log
          path: |
            logs/install.log
            logs/studio.log
            logs/update.log
            logs/studio_post_update.log
          retention-days: 7

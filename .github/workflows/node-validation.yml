# Direct cross-OS proof of the isolated-Node change: unit tests (python decision
# logic + bash + pwsh decision pickers) and a REAL prebuilt install of Node into
# an isolated dir on Windows / Linux / macOS, asserting Node 24.x + npm >= 11.
# This catches platform-specific bugs (Windows .zip vs Unix .tar.gz layout, arch
# detection, npm-cli location) without needing a GPU or a full Studio boot.
name: node-validation

on:
  push:
    branches: [pr-node-isolated-0620]
  pull_request:
    branches: [main]
    paths:
      - 'studio/install_node_prebuilt.py'
      - 'studio/setup.sh'
      - 'studio/setup.ps1'
      - 'tests/studio/install/test_install_node_prebuilt_logic.py'
      - 'tests/sh/test_node_decision.sh'
      - 'tests/studio/test_node_decision.ps1'
      - '.github/workflows/node-validation.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: node-validation ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python decision/helper logic tests
        shell: bash
        env:
          UNSLOTH_COMPILE_DISABLE: '1'
        run: |
          python -m pip install --upgrade pytest
          PYTHONPATH=studio python -m pytest tests/studio/install/test_install_node_prebuilt_logic.py -q

      - name: Bash decision test (decide_node_source)
        shell: bash
        run: bash tests/sh/test_node_decision.sh

      - name: PowerShell decision test (Get-NodeDecision)
        shell: pwsh
        run: pwsh -NoProfile -File tests/studio/test_node_decision.ps1

      - name: Real isolated Node install + assert (24.x / npm >= 11)
        shell: bash
        run: |
          set -e
          DIR="$RUNNER_TEMP/uns_node"
          python studio/install_node_prebuilt.py --install-dir "$DIR" --node-version lts
          # Re-run: must short-circuit ("already matches"), no second download.
          python studio/install_node_prebuilt.py --install-dir "$DIR" --node-version lts 2>&1 | tee rerun.log
          grep -q "already matches" rerun.log
          # Host-aware verification via the module's own resolvers.
          PYTHONPATH=studio python - "$DIR" <<'PY'
          import importlib.util, sys
          from pathlib import Path
          spec = importlib.util.spec_from_file_location("inp", "studio/install_node_prebuilt.py")
          m = importlib.util.module_from_spec(spec); sys.modules["inp"] = m; spec.loader.exec_module(m)
          d = Path(sys.argv[1]); host = m.detect_host()
          nv = m.installed_node_version(d, host)
          npm = m.installed_npm_major(d, host)
          print("node:", nv, "npm_major:", npm, "os:", host.node_os, host.node_arch)
          assert nv and int(nv.split(".")[0]) >= 24, f"bad node version {nv}"
          assert npm is not None and npm >= 11, f"bad npm major {npm}"
          print("OK isolated Node verified on", host.node_os)
          PY

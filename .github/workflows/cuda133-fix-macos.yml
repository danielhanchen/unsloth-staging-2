name: "cuda133-fix macos-14"
on:
  push:
    branches: [pr-cuda133-staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  shell:
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - name: bash --version
        run: bash --version
      - name: nvcc helper test (macOS bash)
        run: bash tests/sh/test_nvcc_meets_llama_minimum.sh
      - name: setup.sh syntax check on macOS bash
        # macOS ships /bin/bash 3.2 by default. The helper must parse cleanly
        # in 3.2 as well so the macOS install path keeps working.
        run: /bin/bash -n studio/setup.sh
      - name: setup.sh syntax check on GNU bash 5
        run: bash -n studio/setup.sh

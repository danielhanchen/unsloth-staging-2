name: Model remote-code consent (ubuntu-latest)
on:
  push:
    branches: [pr-trc-consent]
    paths:
      - 'studio/backend/**'
      - 'scripts/scan_packages.py'
      - '.github/workflows/model-consent-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/backend/**'
      - 'scripts/scan_packages.py'
      - '.github/workflows/model-consent-ci.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      UNSLOTH_COMPILE_DISABLE: '1'
      UNSLOTH_IS_PRESENT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install backend deps
        run: python -m pip install -r studio/backend/requirements/studio.txt transformers==4.57.6 pytest pytest-asyncio pytest-timeout python-multipart
      - name: Run model consent + capability tests
        run: |
          PYTHONPATH=studio/backend python -m pytest \
            studio/backend/tests/test_consent_gate.py \
            studio/backend/tests/test_capability_detection.py \
            studio/backend/tests/test_load_consent.py \
            studio/backend/tests/test_version_router.py \
            studio/backend/tests/test_verify_a.py \
            studio/backend/tests/test_verify_b.py \
            studio/backend/tests/test_verify_c.py \
            studio/backend/tests/test_vision_cache.py \
            -q --timeout=180

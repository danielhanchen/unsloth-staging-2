name: i18n Windows

on:
  push:
    branches: [i18n-cross-platform-ci]
    paths:
      - "studio/frontend/**"
      - ".github/workflows/i18n-windows.yml"
  pull_request:
    paths:
      - "studio/frontend/**"
      - ".github/workflows/i18n-windows.yml"

concurrency:
  group: i18n-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows:
    name: Windows i18n checks
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: studio/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run i18n:check
      - run: npm run build

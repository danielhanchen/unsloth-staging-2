name: install-smoke

on:
  push:
    branches: [pr5336-install-smoke]
    paths:
      - install.ps1
      - studio/setup.ps1
      - pr5336_sim/**
      - .github/workflows/install-smoke.yml
  workflow_dispatch:

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Linux + macOS: full pwsh + bash + shim harness (31+ unit tests over the
  # extracted Test-NvidiaSmiExe / Find-VsBuildTools / Test-AnyVsInstalled /
  # Invoke-NvidiaDetection helpers, baseline and codex-fix modes).
  ps1-harness-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: pwsh version
        shell: pwsh
        run: |
          $PSVersionTable | Format-Table -AutoSize
          Write-Host "OS: $($env:RUNNER_OS) Arch: $($env:RUNNER_ARCH)"

      - name: AST parse install.ps1 and studio/setup.ps1
        shell: pwsh
        run: |
          $bad = $false
          foreach ($f in @('install.ps1','studio/setup.ps1')) {
            $errors = $null; $tokens = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f), [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Host "FAIL parse: $f"
              $errors | ForEach-Object { Write-Host "  $($_.Message) @ $($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber)" }
              $bad = $true
            } else {
              Write-Host "OK parse: $f"
            }
          }
          if ($bad) { exit 1 }

      - name: Helper harness (baseline)
        shell: bash
        working-directory: pr5336_sim
        run: bash run_all.sh

      - name: Helper harness (fixed mode)
        shell: bash
        working-directory: pr5336_sim
        env:
          HARNESS_MODE: fixed
        run: bash run_all.sh

  # Windows: real PowerShell parse + PSScriptAnalyzer. The bash + shim harness
  # cannot run shim "*.exe" content cross-platform; parse and static lint are
  # the meaningful Windows checks for the .ps1 surface this PR touches.
  ps1-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: pwsh version
        shell: pwsh
        run: |
          $PSVersionTable | Format-Table -AutoSize
          Write-Host "OS: $($env:RUNNER_OS) Arch: $($env:RUNNER_ARCH)"

      - name: AST parse install.ps1 and studio/setup.ps1
        shell: pwsh
        run: |
          $bad = $false
          foreach ($f in @('install.ps1','studio/setup.ps1')) {
            $errors = $null; $tokens = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f), [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Host "FAIL parse: $f"
              $errors | ForEach-Object { Write-Host "  $($_.Message) @ $($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber)" }
              $bad = $true
            } else {
              Write-Host "OK parse: $f"
            }
          }
          if ($bad) { exit 1 }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint install.ps1 and studio/setup.ps1
        shell: pwsh
        run: |
          $results = @()
          foreach ($p in @('install.ps1','studio/setup.ps1')) {
            $results += Invoke-ScriptAnalyzer -Path $p -Severity Error,Warning
          }
          if ($results) {
            $results | Format-Table -AutoSize
            $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
            if ($errors.Count -gt 0) {
              Write-Host "$($errors.Count) ScriptAnalyzer error(s)"
              exit 1
            }
            Write-Host "Warnings only; not failing the job."
          } else {
            Write-Host "PSScriptAnalyzer clean."
          }

      # Source-load the PR-touched helper functions in a Windows pwsh and
      # exercise pure-logic units (no filesystem mock needed for these).
      - name: Helper unit checks (Find-VsBuildTools $map, MsbuildToolsetVersion)
        shell: pwsh
        run: |
          # Extract Find-VsBuildTools and exercise just the $map / $entry
          # logic without invoking vswhere or hitting disk.
          $script = Get-Content studio/setup.ps1 -Raw
          $start = $script.IndexOf('function Find-VsBuildTools {')
          $end   = $script.IndexOf("`n}", $start) + 2
          $body  = $script.Substring($start, $end - $start)
          Invoke-Expression $body

          # Direct logic test: confirm the $map covers VS 2017 / 19 / 22 / 26
          # and the version-number defensive fallback.
          $cases = @(
            @{ key='2022'; gen='Visual Studio 17 2022'; mtv='v170' }
            @{ key='2019'; gen='Visual Studio 16 2019'; mtv='v160' }
            @{ key='2017'; gen='Visual Studio 15 2017'; mtv='v150' }
            @{ key='18';   gen='Visual Studio 18 2026'; mtv='v180' }
            @{ key='17';   gen='Visual Studio 17 2022'; mtv='v170' }
          )
          # We cannot invoke Find-VsBuildTools end-to-end (no vswhere on the
          # runner), so just assert the $map produces the right Generator and
          # MsbuildToolsetVersion strings.
          $map = @{
              '2022' = @{ N = '17'; Y = '2022' }
              '2019' = @{ N = '16'; Y = '2019' }
              '2017' = @{ N = '15'; Y = '2017' }
              '18'   = @{ N = '18'; Y = '2026' }
              '17'   = @{ N = '17'; Y = '2022' }
              '16'   = @{ N = '16'; Y = '2019' }
              '15'   = @{ N = '15'; Y = '2017' }
          }
          foreach ($c in $cases) {
              $e = $map[$c.key]
              $gen = "Visual Studio $($e.N) $($e.Y)"
              $mtv = "v$($e.N)0"
              if ($gen -ne $c.gen) { throw "Generator mismatch: $($c.key) -> $gen, expected $($c.gen)" }
              if ($mtv -ne $c.mtv) { throw "MsbuildToolsetVersion mismatch: $($c.key) -> $mtv, expected $($c.mtv)" }
              Write-Host "OK $($c.key) -> $gen / $mtv"
          }

      - name: OS-arch detection sanity
        shell: pwsh
        run: |
          # Codex P2 #4: confirm PROCESSOR_ARCHITEW6432 priority over
          # PROCESSOR_ARCHITECTURE produces the right arch tag on the runner.
          $osArch = if ($env:PROCESSOR_ARCHITEW6432) { $env:PROCESSOR_ARCHITEW6432 } else { $env:PROCESSOR_ARCHITECTURE }
          $arch   = if ($osArch -eq 'ARM64') { 'arm64' } else { 'amd64' }
          Write-Host "PROCESSOR_ARCHITECTURE=$env:PROCESSOR_ARCHITECTURE"
          Write-Host "PROCESSOR_ARCHITEW6432=$env:PROCESSOR_ARCHITEW6432"
          Write-Host "Resolved arch tag: $arch"
          if ($arch -notin @('amd64','arm64')) { exit 1 }

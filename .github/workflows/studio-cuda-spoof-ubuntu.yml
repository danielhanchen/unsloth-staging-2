# Studio: CUDA-spoofed import + CLI help on Ubuntu.
# Runner has no GPU; tests/_zoo_aggressive_cuda_spoof.py makes
# torch.cuda.is_available() report True and friends. Exercises code
# paths that would otherwise only fire on a real CUDA box without
# needing one.
name: Studio CUDA-spoofed Ubuntu

on:
  push:
    branches: [studio-cross-platform-ci]
    paths:
      - 'studio/**'
      - 'unsloth/**'
      - 'unsloth_cli/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/studio-cuda-spoof-ubuntu.yml'
  pull_request:
    paths:
      - 'studio/**'
      - 'unsloth/**'
      - 'unsloth_cli/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/studio-cuda-spoof-ubuntu.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spoof:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Linux deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r studio/backend/requirements/studio.txt
          python -m pip install python-multipart
          # torch is not a hard dep of `unsloth` core; install the CPU-only
          # wheel explicitly so the CUDA spoof has a real torch.cuda to
          # monkey-patch.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install pytest pytest-timeout

      - name: Verify spoof activates cleanly
        env:
          UNSLOTH_DISABLE_AUTO_UPDATES: '1'
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "tests")
          import _zoo_aggressive_cuda_spoof as spoof
          spoof.apply()
          import torch
          assert torch.cuda.is_available(), "spoof failed"
          assert torch.cuda.get_device_capability() == (8, 0)
          print("torch.cuda:", torch.cuda.get_device_name(),
                torch.cuda.get_device_capability())
          # Studio import after spoof must still succeed.
          from studio.backend.main import app
          print("studio.backend.main:app ok under spoof:", type(app).__name__)
          # CLI dispatch must not crash either.
          PY

      - name: CLI help under spoof
        env:
          UNSLOTH_DISABLE_AUTO_UPDATES: '1'
        run: |
          # Pre-apply the spoof via sitecustomize so subprocess CLI dispatch
          # also sees it.
          export PYTHONSTARTUP=""
          mkdir -p ./_sitespoof
          cat > ./_sitespoof/sitecustomize.py <<'PY'
          import os, sys
          if os.environ.get("UNSLOTH_SPOOF_CUDA", "0") == "1":
              sys.path.insert(0, "tests")
              try:
                  import _zoo_aggressive_cuda_spoof as _spoof
                  _spoof.apply()
              except Exception as _e:
                  print("spoof import failed:", _e, file=sys.stderr)
          PY
          export PYTHONPATH="$(pwd)/_sitespoof:$PYTHONPATH"
          export UNSLOTH_SPOOF_CUDA=1
          unsloth --help
          unsloth studio --help

      - name: Run vllm-compat smoke under spoof (best effort)
        run: |
          if [[ -f tests/vllm_compat/test_unsloth_zoo_imports.py ]]; then
              python -m pytest tests/vllm_compat/test_unsloth_zoo_imports.py -x -q || \
                  echo "vllm_compat smoke failed (non-gating; spoof gap)"
          else
              echo "tests/vllm_compat/ absent; skipping"
          fi

name: cuda133 prebuilt repro - windows-latest
on:
  push:
    branches: [cuda133-prebuilt-repro]
    paths:
      - 'studio/install_llama_prebuilt.py'
      - 'studio/install_llama_prebuilt_fixed.py'
      - 'tests/studio/test_cuda133_prebuilt_selection.py'
      - '.github/workflows/cuda133-repro-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'studio/install_llama_prebuilt.py'
      - 'studio/install_llama_prebuilt_fixed.py'
      - 'tests/studio/test_cuda133_prebuilt_selection.py'
      - '.github/workflows/cuda133-repro-windows.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install --upgrade pip pytest pytest-timeout
      - name: Reproduce cuda13.3 prebuilt selection (spoofed, no GPU)
        run: python -m pytest tests/studio/test_cuda133_prebuilt_selection.py -v --noconftest -p no:cacheprovider

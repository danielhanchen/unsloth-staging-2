name: PR-6166 ubuntu-latest
on:
  push:
    branches: [pr6166-cross-os]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'tests/python/test_cross_platform_parity.py'
      - 'ci_validation/**'
      - '.github/workflows/pr6166-ubuntu.yml'
  pull_request:
    branches: [main]
    paths:
      - 'install.sh'
      - 'install.ps1'
      - 'tests/python/test_cross_platform_parity.py'
      - 'ci_validation/**'
      - '.github/workflows/pr6166-ubuntu.yml'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install -U pip pytest
      - name: Parity test (install.sh / install.ps1)
        run: python -m pytest tests/python/test_cross_platform_parity.py -q
      - name: install.sh version gate (bash and /bin/sh)
        run: |
          bash ci_validation/test_install_sh_version.sh
          sh ci_validation/test_install_sh_version.sh
      - name: Real uv bytecode-timeout differential
        run: python ci_validation/uv_differential.py

# Build the Unsloth Blackwell Docker image for linux/arm64 on the free
# native ubuntu-24.04-arm GitHub Actions runner (4 vCPU, GA Aug 2025 for
# public repos). ~3x faster than QEMU emulation; validates the path
# DGX Spark / Grace users actually take when they `docker pull`.
#
# Validates the arm64-only Dockerfile branch:
#   * Switches unsloth extras to [huggingface] (no xformers on arm64)
#   * Installs cuda-nvrtc-13-0 + cuda-nvcc-13-0 from NVIDIA's sbsa repo
#   * Symlinks libnvrtc.so.12 -> libnvrtc.so.13 inside the venv
# Any of these breaking shows up here, on a fresh runner with no caches.

name: docker-build-arm64-native

on:
  push:
    branches: [docker-blackwell-ci]
    paths:
      - 'docker/**'
      - 'tests/conftest.py'
      - 'tests/_zoo_aggressive_cuda_spoof.py'
      - '.github/workflows/docker-build-arm64-native.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-build-arm64-native.yml'

concurrency:
  group: docker-build-arm64-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Reclaim disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Build arm64 image (native)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --progress=plain \
            --load \
            --tag unsloth-blackwell:test-arm64 \
            --build-arg CUDA_VERSION=12.8.1 \
            --build-arg UBUNTU_VERSION=24.04 \
            --build-arg PYTHON_VERSION=3.12 \
            -f docker/Dockerfile docker/

      - name: Inspect built image
        run: |
          docker image inspect unsloth-blackwell:test-arm64 \
              --format 'image_id={{.Id}} arch={{.Architecture}} os={{.Os}} size={{.Size}}'
          docker image ls unsloth-blackwell

      # Validate the NVRTC symlink + ptxas swap landed where expected.
      # These files only exist on the arm64 variant.
      - name: Verify cu13 NVRTC + ptxas baked correctly
        run: |
          docker run --rm --entrypoint bash unsloth-blackwell:test-arm64 -c '
            set -eux
            ls -l /usr/local/cuda-13.0/lib64/libnvrtc.so.13
            ls -l /usr/local/cuda-13.0/bin/ptxas
            ls -l /opt/unsloth-venv/lib/python3.12/site-packages/nvidia/cuda_nvrtc/lib/libnvrtc.so.12
            readlink /opt/unsloth-venv/lib/python3.12/site-packages/nvidia/cuda_nvrtc/lib/libnvrtc.so.12 \
              | grep -q "/usr/local/cuda-13.0/lib64/libnvrtc.so.13"
            /usr/local/cuda-13.0/bin/ptxas --version | head -3
          '

      - name: Verify image imports under CUDA spoof
        run: |
          docker run --rm \
              -e UNSLOTH_SKIP_GPU_CHECK=1 \
              -e PYTHONDONTWRITEBYTECODE=1 \
              -v "${{ github.workspace }}/tests:/spoof:ro" \
              unsloth-blackwell:test-arm64 \
              python -c "
          import sys
          sys.path.insert(0, '/spoof')
          import _zoo_aggressive_cuda_spoof
          _zoo_aggressive_cuda_spoof.apply()
          import torch
          print('torch', torch.__version__, 'cuda', torch.version.cuda)
          print('arches:', torch._C._cuda_getArchFlags())
          # On aarch64 cu128 wheel we expect at least sm_100 + sm_120.
          arches = torch._C._cuda_getArchFlags().split()
          assert 'sm_100' in arches, arches
          assert 'sm_120' in arches, arches
          import unsloth_zoo
          import unsloth
          print('imports OK; SASS coverage verified')
          "

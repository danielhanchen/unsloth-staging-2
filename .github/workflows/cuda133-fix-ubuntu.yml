name: "cuda133-fix ubuntu-latest"
on:
  push:
    branches: [pr-cuda133-staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - name: bash --version
        run: bash --version
      - name: nvcc helper test
        run: bash tests/sh/test_nvcc_meets_llama_minimum.sh
      - name: torch index test (with new 13.3 cases)
        run: bash tests/sh/test_get_torch_index_url.sh
      - name: setup.sh and install.sh syntax
        run: |
          bash -n studio/setup.sh
          bash -n install.sh

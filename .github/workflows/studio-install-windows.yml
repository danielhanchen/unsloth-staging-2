# Studio install + import smoke on Windows.
# Catches Path/encoding/PowerShell-vs-bash bugs that only surface here.
name: Studio install Windows

on:
  push:
    branches: [studio-cross-platform-ci]
    paths:
      - 'studio/**'
      - 'unsloth/**'
      - 'unsloth_cli/**'
      - 'install.ps1'
      - 'pyproject.toml'
      - '.github/workflows/studio-install-windows.yml'
  pull_request:
    paths:
      - 'studio/**'
      - 'unsloth/**'
      - 'unsloth_cli/**'
      - 'install.ps1'
      - 'pyproject.toml'
      - '.github/workflows/studio-install-windows.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Show env
        run: |
          python -V
          pip --version
          Get-ComputerInfo OsName, OsVersion 2>$null

      - name: Pip install unsloth + studio backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r studio/backend/requirements/studio.txt
          python -m pip install python-multipart

      - name: Smoke import (no CUDA)
        env:
          UNSLOTH_DISABLE_AUTO_UPDATES: '1'
        run: |
          python -c "import sys; print('python:', sys.version)"
          python -c "import unsloth_cli; print('unsloth_cli ok')"
          python -c "from studio.backend.main import app; print('studio.backend.main:app ok', type(app).__name__)"

      - name: CLI help
        env:
          UNSLOTH_DISABLE_AUTO_UPDATES: '1'
        run: |
          unsloth --help
          unsloth studio --help

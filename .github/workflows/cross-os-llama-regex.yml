# Cross-OS validation for the mid-plan EOS regex constants used by the
# llama.cpp auto-continue path. The test extracts the patterns from
# studio/backend/core/inference/llama_cpp.py with ast and recompiles
# them in-place, so the matrix only needs Python + pytest (no torch,
# no transformers, no native deps).
#
# Refresh trigger: re-run all three cross-OS workflows on the same HEAD
# so the PR check rollup shows a complete pass.

name: Cross-OS llama regex

on:
  push:
    branches: [studio/cross-os-validation]
    paths:
      - 'studio/backend/core/inference/llama_cpp.py'
      - 'tests/cross_os/test_llama_cpp_trailing_plan.py'
      - '.github/workflows/cross-os-llama-regex.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regex:
    name: regex (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pytest only
        run: python -m pip install --upgrade pip pytest

      - name: Run regex unit tests
        run: python -m pytest tests/cross_os/test_llama_cpp_trailing_plan.py -v

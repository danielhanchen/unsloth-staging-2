# Reproduction: Apple Silicon Mac with an OLD unsloth in the Studio venv,
# user clicks `unsloth studio update`. Symptoms reported:
#   * update "just fails"
#   * after browser opens, running studio appears OLD (downgrade?)
#
# Each matrix entry pins a specific OLD release and runs the user's exact
# code path on a macos-14 M1 runner:
#   1. install via that release's own install.sh  (MLX-only Mac).
#      The OLD install.sh's `unsloth>=2026.5.1` (or similar) constraint
#      means pip picks the LATEST -- so we then force the OLD unsloth
#      back into the venv to faithfully reproduce a user who installed
#      months ago and never updated.
#   2. confirm OLD unsloth + OLD studio/setup.sh in venv.
#   3. run `unsloth studio update`.
#   4. assert post-update unsloth strictly newer than OLD.

name: Mac stale-update repro

on:
  push:
    branches:
      - mac-stale-update-investigation
    paths:
      - 'install.sh'
      - 'studio/setup.sh'
      - 'studio/install_python_stack.py'
      - 'studio/backend/utils/hardware/**'
      - 'unsloth_cli/commands/studio.py'
      - 'pyproject.toml'
      - '.github/workflows/mac-stale-update.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stale-update:
    name: ${{ matrix.old_version }} -> latest on macos-14
    runs-on: macos-14
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        old_version:
          # ~2 months ago -- user's best guess.
          - '2026.3.18'
          # last April release, before the May rewrites.
          - '2026.4.8'
          # previously suspected.
          - '2026.5.2'
          # one behind current latest -- canary.
          - '2026.5.6'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Sanity -- runner arch
        run: |
          uname -a
          uname -m
          uname -p
          sysctl -in hw.optional.arm64 || true
          arch

      - name: Fetch OLD release sdist (${{ matrix.old_version }})
        run: |
          mkdir -p old_release logs
          curl -fsSL "https://files.pythonhosted.org/packages/source/u/unsloth/unsloth-${{ matrix.old_version }}.tar.gz" \
            -o "old_release/sdist.tar.gz"
          tar -xzf old_release/sdist.tar.gz -C old_release --strip-components=1
          test -f old_release/install.sh
          test -f old_release/studio/setup.sh

      - name: Install Studio via OLD install.sh (with torch -- MLX Mac default)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          # No --no-torch: Apple Silicon install.sh installs the MPS torch
          # build by default, which is what the user's real machine has.
          bash old_release/install.sh 2>&1 | tee logs/install_old.log

      - name: Force-downgrade unsloth + unsloth-zoo + bundled studio package to OLD
        run: |
          set -euo pipefail
          VENV_PY="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          test -x "$VENV_PY"
          # The OLD install.sh hard-pins `unsloth>=2026.5.1` so pip resolved
          # to the latest. Force the OLD wheel back in so the venv ships
          # the actual ${{ matrix.old_version }} setup.sh / install_python_stack.py
          # that `unsloth studio update` will then re-exec.
          "$VENV_PY" -m pip install --no-deps --force-reinstall \
            "unsloth==${{ matrix.old_version }}" 2>&1 | tee -a logs/install_old.log
          # Also pin a compatible unsloth-zoo. For the bundled `studio/`
          # package we explicitly verify the setup.sh shipped is the OLD one.

      - name: Confirm OLD version + OLD setup.sh in venv
        run: |
          set -euo pipefail
          VENV_PY="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          INSTALLED=$("$VENV_PY" -c "from importlib.metadata import version; print(version('unsloth'))")
          echo "Installed: $INSTALLED"
          if [ "$INSTALLED" != "${{ matrix.old_version }}" ]; then
            echo "::error::expected unsloth==${{ matrix.old_version }}, got $INSTALLED"
            exit 1
          fi
          # Resolve the venv's studio/setup.sh directly via its site-packages
          # instead of `import studio` -- the checkout's repo root has a
          # `studio/` package on the CWD-sys.path and Python finds that one
          # first.
          SITE=$("$VENV_PY" -I -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          OLD_SETUP_INVENV="$SITE/studio/setup.sh"
          echo "setup.sh in venv: $OLD_SETUP_INVENV"
          ls -la "$OLD_SETUP_INVENV" old_release/studio/setup.sh
          # md5sum is missing on macOS; use shasum which exists everywhere.
          shasum "$OLD_SETUP_INVENV" old_release/studio/setup.sh
          if ! diff -q "$OLD_SETUP_INVENV" old_release/studio/setup.sh >/dev/null 2>&1; then
            echo "::warning::venv setup.sh differs from OLD sdist's setup.sh -- the OLD-wheel content was not fully restored"
          fi

      - name: Run `unsloth studio update --verbose` (the user's broken path)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          set -o pipefail
          # --verbose so we capture the actual pip command pip ran, which
          # tells us whether the resolver landed on 2026.5.2 vs latest and
          # why.
          unsloth studio update --verbose 2>&1 | tee logs/update.log
          rc=${PIPESTATUS[0]}
          echo "update exit code: $rc"
          echo "$rc" > logs/update.rc

      - name: Post-update state
        run: |
          set -euo pipefail
          VENV_PY="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          POST=$("$VENV_PY" -c "from importlib.metadata import version; print(version('unsloth'))" 2>&1 || echo "MISSING")
          echo "Post-update unsloth version: $POST"
          echo "$POST" > logs/post_update_version.txt
          "$VENV_PY" -I -c "import platform; print('machine =', platform.machine()); print('processor =', platform.processor())" \
            | tee logs/platform_probe.txt
          SITE=$("$VENV_PY" -I -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          "$VENV_PY" -I -c "
          import sys, pathlib
          backend = pathlib.Path(r'$SITE') / 'studio' / 'backend'
          sys.path.insert(0, str(backend))
          from utils.hardware.hardware import detect_hardware
          detect_hardware()
          " 2>&1 | tee logs/hardware_detect.log || true

      - name: Diff OLD vs post-update setup.sh
        run: |
          VENV_PY="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          SITE=$("$VENV_PY" -I -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          POST_SETUP="$SITE/studio/setup.sh"
          echo "::group::diff OLD ${{ matrix.old_version }} setup.sh -> post-update setup.sh"
          diff -u old_release/studio/setup.sh "$POST_SETUP" | head -300 || true
          echo "::endgroup::"

      - name: Record pre-fix update outcome (the bug = no advance)
        run: |
          POST=$(cat logs/post_update_version.txt)
          OLD="${{ matrix.old_version }}"
          LATEST=$(curl -fsSL https://pypi.org/pypi/unsloth/json | python3 -c "import json,sys; print(json.load(sys.stdin)['info']['version'])")
          echo "$LATEST" > logs/latest_version.txt
          echo "OLD=$OLD"
          echo "POST=$POST"
          echo "LATEST=$LATEST"
          # We do NOT exit non-zero here even if POST != LATEST -- the OLD-code
          # path is expected to fail (that is the bug we're documenting). The
          # decisive assertion runs after the overlay-the-fix step below.
          if [ "$POST" = "$LATEST" ]; then
            echo "pre-fix update reached LATEST (no bug reproduced for $OLD)" > logs/prefix_status.txt
          else
            echo "pre-fix update did NOT reach LATEST: OLD=$OLD POST=$POST LATEST=$LATEST" > logs/prefix_status.txt
          fi
          cat logs/prefix_status.txt

      - name: Overlay FIXED files from the checkout into the venv
        # Simulates the recovery path: user re-ran `curl install.sh | sh` so
        # the NEW install_python_stack.py + hardware.py land in their venv,
        # but the rest of the OLD release's state (lower unsloth version,
        # studio/setup.sh shell wrapper) is still on disk. The subsequent
        # `unsloth studio update` should then advance to LATEST.
        run: |
          set -euo pipefail
          VENV_PY="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          SITE=$("$VENV_PY" -I -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          cp -f "$GITHUB_WORKSPACE/studio/install_python_stack.py" "$SITE/studio/install_python_stack.py"
          cp -f "$GITHUB_WORKSPACE/studio/backend/utils/hardware/hardware.py" \
                "$SITE/studio/backend/utils/hardware/hardware.py"
          echo "overlaid:"
          shasum "$SITE/studio/install_python_stack.py" \
                 "$SITE/studio/backend/utils/hardware/hardware.py"

      - name: Force-downgrade unsloth again so the second update has work to do
        run: |
          set -euo pipefail
          VENV_PY="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          # The first `unsloth studio update` may have partially advanced
          # (e.g. 2026.3.18 -> 2026.5.2). Force back to OLD so the second
          # update is a clean retry of the broken upgrade path under the
          # FIXED install_python_stack.py.
          "$VENV_PY" -m pip install --no-deps --force-reinstall \
            "unsloth==${{ matrix.old_version }}" 2>&1 | tee -a logs/install_old.log
          # Restore the overlay (force-reinstall just wrote the OLD wheel's
          # install_python_stack.py back over our copy).
          SITE=$("$VENV_PY" -I -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          cp -f "$GITHUB_WORKSPACE/studio/install_python_stack.py" "$SITE/studio/install_python_stack.py"
          cp -f "$GITHUB_WORKSPACE/studio/backend/utils/hardware/hardware.py" \
                "$SITE/studio/backend/utils/hardware/hardware.py"

      - name: Run `unsloth studio update --verbose` with the FIX in place
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          set -o pipefail
          unsloth studio update --verbose 2>&1 | tee logs/update_with_fix.log
          rc=${PIPESTATUS[0]}
          echo "update-with-fix exit code: $rc"
          echo "$rc" > logs/update_with_fix.rc

      - name: Assert FIXED update advances unsloth to LATEST
        run: |
          VENV_PY="$HOME/.unsloth/studio/unsloth_studio/bin/python"
          POST=$("$VENV_PY" -c "from importlib.metadata import version; print(version('unsloth'))")
          OLD="${{ matrix.old_version }}"
          LATEST=$(cat logs/latest_version.txt)
          echo "OLD=$OLD"
          echo "POST(with fix)=$POST"
          echo "LATEST=$LATEST"
          echo "$POST" > logs/post_update_with_fix_version.txt
          if [ "$POST" = "$OLD" ]; then
            echo "::error::FIX-FAILED-STALE: unsloth still on $POST after fixed update from $OLD"
            exit 1
          fi
          if ! "$VENV_PY" -c "from packaging.version import Version; import sys; sys.exit(0 if Version('$POST') > Version('$OLD') else 1)"; then
            echo "::error::FIX-FAILED-DOWNGRADE: $OLD -> $POST"
            exit 1
          fi
          if [ "$POST" != "$LATEST" ]; then
            echo "::error::FIX-FAILED-PARTIAL: $OLD -> $POST but LATEST=$LATEST"
            exit 1
          fi
          echo "FIX OK: $OLD -> $POST (== LATEST)"

      - name: Upload all logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mac-stale-update-${{ matrix.old_version }}-${{ github.run_id }}
          path: |
            logs/
          retention-days: 7

# Post-merge validation for unslothai/unsloth-zoo#697: the proven Studio
# API & Auth smoke (from studio-api-smoke.yml) with unsloth-zoo force
# pinned to current main, which now contains the #697 MLX save / GGUF
# export changes. Proves Studio installs, boots API-only, serves
# /api/health, and passes the HTTP auth/inference surface with the
# merged zoo.

name: "zoo697 studio api ubuntu"

on:
  push:
    branches: [zoo697-postmerge-mlx]
    paths:
      - '.github/workflows/zoo697-studio-api-ubuntu.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-smoke:
    name: studio api with zoo main
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GGUF_REPO: unsloth/gemma-3-270m-it-GGUF
      GGUF_VARIANT: UD-Q4_K_XL
      GGUF_FILE: gemma-3-270m-it-UD-Q4_K_XL.gguf
      STUDIO_PORT: '18893'
      HF_HOME: ${{ github.workspace }}/hf-cache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev jq

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Restore HF_HOME for ${{ env.GGUF_REPO }}
        id: cache-hf
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        continue-on-error: true
        with:
          path: hf-cache
          key: ${{ runner.os }}-hf-${{ env.GGUF_REPO }}-${{ env.GGUF_VARIANT }}-v1

      - name: Prime HF_HOME with the GGUF
        id: prime-hf
        if: steps.cache-hf.outputs.cache-hit != 'true' || steps.cache-hf.outcome != 'success'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m pip install --upgrade huggingface_hub
          mkdir -p hf-cache
          bash .github/scripts/hf-download-with-retry.sh "$GGUF_REPO" "$GGUF_FILE"

      - name: Install Studio (--local, --no-torch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          set -o pipefail
          bash install.sh --local --no-torch 2>&1 | tee logs/install.log

      - name: Pin unsloth-zoo to current main (post #697 merge)
        run: |
          VENV_PY=$(find "$HOME/.unsloth" -maxdepth 4 -name python -path '*/bin/*' 2>/dev/null | head -1)
          if [ -z "$VENV_PY" ]; then
            echo "::error::No Studio venv python under ~/.unsloth"
            find "$HOME/.unsloth" -maxdepth 3 2>/dev/null | head -40
            exit 1
          fi
          echo "Studio venv python: $VENV_PY"
          "$VENV_PY" -m pip install --force-reinstall --no-deps \
            "unsloth_zoo @ git+https://github.com/unslothai/unsloth-zoo@main"
          "$VENV_PY" -c "
          import importlib.metadata as md
          files = [str(f) for f in md.distribution('unsloth-zoo').files]
          assert any(f.endswith('mlx/utils.py') for f in files), 'mlx/utils.py missing'
          print('OK: zoo main with #697 surface installed in Studio venv')
          "

      - name: Install pyjwt for the JWT-expiry forge test
        run: pip install 'pyjwt>=2.6'

      - name: Reset auth + boot Studio (API-only)
        run: |
          unsloth studio reset-password
          mkdir -p logs
          UNSLOTH_API_ONLY=1 unsloth studio -H 127.0.0.1 -p "$STUDIO_PORT" \
            > logs/studio.log 2>&1 &
          echo "STUDIO_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 180); do
            if curl -fs "http://127.0.0.1:${STUDIO_PORT}/api/health" > /tmp/health.json; then
              jq -e '.status == "healthy"' /tmp/health.json && break
            fi
            sleep 1
          done
          jq -e '.status == "healthy"' /tmp/health.json

      - name: Pass bootstrap password + rotated targets to the test
        run: |
          OLD=$(cat ~/.unsloth/studio/auth/.bootstrap_password)
          NEW="ApiSmoke-$(python -c 'import secrets; print(secrets.token_urlsafe(16))')"
          NEW2="ApiSmoke-$(python -c 'import secrets; print(secrets.token_urlsafe(16))')"
          echo "::add-mask::$OLD"
          echo "::add-mask::$NEW"
          echo "::add-mask::$NEW2"
          echo "STUDIO_OLD_PW=$OLD"  >> "$GITHUB_ENV"
          echo "STUDIO_NEW_PW=$NEW"  >> "$GITHUB_ENV"
          echo "STUDIO_NEW2_PW=$NEW2" >> "$GITHUB_ENV"

      - name: Run Studio API & Auth tests
        env:
          BASE_URL: http://127.0.0.1:18893
          STUDIO_AUTH_DIR: /home/runner/.unsloth/studio/auth
        run: python tests/studio/studio_api_smoke.py

      - name: Stop Studio
        if: always()
        run: |
          kill "${STUDIO_PID}" 2>/dev/null || true
          sleep 2

      - name: Upload API smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zoo697-studio-api-log
          path: |
            logs/install.log
            logs/studio.log
          retention-days: 7

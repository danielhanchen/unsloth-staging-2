# Cross-OS validation that studio/frontend builds end-to-end on Ubuntu,
# macOS and Windows. tsc -b runs the project references graph, then
# vite build emits dist/. Catches OS-specific path / lockfile / build
# regressions that only ubuntu-latest CI would miss today.

name: Cross-OS frontend build

on:
  push:
    branches: [studio/cross-os-validation]
    paths:
      - 'studio/frontend/**'
      - '.github/workflows/cross-os-frontend-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    defaults:
      run:
        shell: bash
        working-directory: studio/frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: studio/frontend/package-lock.json

      - name: Install deps (npm ci)
        run: npm ci --no-audit --no-fund

      - name: Type-check (tsc -b)
        run: npx tsc -b --pretty false

      - name: Vite production build
        run: npm run build

      - name: Verify dist artifacts exist
        run: |
          test -f dist/index.html
          test -d dist/assets
          # Count is enough; piping ls into head triggers SIGPIPE under
          # `set -e -o pipefail` on ubuntu-latest's bash.
          count=$(ls dist/assets | wc -l)
          echo "dist/assets contains $count files"
          test "$count" -gt 0
